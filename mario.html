<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Claude Bros.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a0a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;}
h1{color:#FFD700;font-size:24px;font-weight:bold;text-shadow:2px 2px 0 #FF4500,4px 4px 0 #8B0000;letter-spacing:2px;margin-bottom:6px;}
#hud{display:flex;gap:32px;color:#fff;font-size:14px;font-weight:bold;margin-bottom:6px;}
#hud span{display:flex;flex-direction:column;align-items:center;}
#hud .lbl{font-size:10px;color:#aaa;}
#hud .val{font-size:18px;color:#FFD700;}
canvas{border:3px solid #FFD700;box-shadow:0 0 24px #FFD70066;display:block;max-width:100vw;}
#ctrl{color:#777;font-size:11px;margin-top:6px;text-align:center;line-height:1.8;}
</style>
</head>
<body>
<h1>⭐ SUPER CLAUDE BROS ⭐</h1>
<div id="hud">
  <span><div class="lbl">SCORE</div><div class="val" id="sc">0</div></span>
  <span><div class="lbl">COINS</div><div class="val" id="co">0</div></span>
  <span><div class="lbl">LIVES</div><div class="val" id="li">3</div></span>
  <span><div class="lbl">LEVEL</div><div class="val" id="lv">1</div></span>
  <span><div class="lbl">TIME</div><div class="val" id="ti">300</div></span>
</div>
<canvas id="c"></canvas>
<div id="ctrl">← → 移動 &nbsp;|&nbsp; スペース / ↑ ジャンプ（長押しで高く）&nbsp;|&nbsp; Shift ダッシュ<br>モバイル: 画面左右タップで移動、上タップでジャンプ</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// Canvas size
const W = 768, H = 400;
cv.width = W; cv.height = H;

// HUD elements
const elSc = document.getElementById('sc');
const elCo = document.getElementById('co');
const elLi = document.getElementById('li');
const elLv = document.getElementById('lv');
const elTi = document.getElementById('ti');

// ─── AUDIO ───
let AC = null;
function getAC() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function beep(freq, dur, vol=0.25, type='square') {
  try {
    const ac = getAC(), o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
const sfxJump  = () => { beep(380, 0.08); setTimeout(() => beep(560, 0.10), 60); };
const sfxCoin  = () => { beep(880, 0.07, 0.2, 'sine'); setTimeout(() => beep(1320, 0.10, 0.15, 'sine'), 55); };
const sfxStomp = () => { beep(260, 0.09); setTimeout(() => beep(180, 0.12), 60); };
const sfxHurt  = () => { beep(120, 0.22, 0.35, 'sawtooth'); };
const sfxClear = () => [400,500,630,800,1000].forEach((f,i) => setTimeout(() => beep(f, 0.12, 0.2, 'sine'), i*70));

// ─── INPUT ───
const keys = {};
let tL = false, tR = false, tJ = false;
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (gs !== 'play') doAction();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gs !== 'play') { doAction(); return; }
  const r = cv.getBoundingClientRect(), sx = W / r.width, sy = H / r.height;
  for (const t of e.changedTouches) {
    const tx = (t.clientX - r.left) * sx, ty = (t.clientY - r.top) * sy;
    if (ty < H * 0.42) tJ = true;
    else if (tx < W / 2) tL = true;
    else tR = true;
  }
}, { passive: false });
cv.addEventListener('touchend', e => { e.preventDefault(); tL = tR = tJ = false; }, { passive: false });
const isL   = () => keys['ArrowLeft']  || keys['KeyA'] || tL;
const isR   = () => keys['ArrowRight'] || keys['KeyD'] || tR;
const isJ   = () => keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || tJ;
const isRun = () => keys['ShiftLeft'] || keys['ShiftRight'];

// ─── GAME STATE ───
let gs = 'start'; // start | play | dead | win | over
let score = 0, coins = 0, lives = 3, level = 1;
let timer = 300, timerTick = 0;
let camX = 0;
let parts = [];
let ld = null; // level data

function doAction() {
  if (gs === 'start') { startGame(); return; }
  if (gs === 'win')   { startGame(); return; }
  if (gs === 'dead')  { lives > 0 ? startGame() : (gs = 'over'); return; }
  if (gs === 'over')  { score = 0; coins = 0; lives = 3; level = 1; startGame(); }
}

// ─── LEVEL BUILDER ───
const TW = 32;
function buildLevel(lv) {
  const LW = 180, LPX = LW * TW;
  const ground = [], plats = [], enemies = [], coinList = [], qblocks = [], pipes = [];

  // Solid ground rows
  for (let x = 0; x < LW; x++) {
    ground.push({ x: x*TW, y: H-TW,   w: TW, h: TW });
    ground.push({ x: x*TW, y: H-TW*2, w: TW, h: TW });
  }
  // Gaps: remove ground tiles
  const gapCols = new Set();
  [50, 75, 105, 130, 150].forEach(g => { for (let i = 0; i < 4 + (lv > 1 ? 1 : 0); i++) gapCols.add(g + i); });
  const solidGround = ground.filter(t => !gapCols.has(Math.floor(t.x / TW)));

  // Scattered content
  let x = 8;
  while (x < LW - 12) {
    const r = Math.random();
    if (r < 0.20) {
      // Brick platform
      const pw = 3 + (Math.random() * 3 | 0);
      const py = H - TW * (4 + (Math.random() * 3 | 0));
      plats.push({ x: x*TW, y: py, w: pw*TW, h: TW });
      for (let i = 0; i < pw; i++) coinList.push({ x: x*TW + i*TW + TW/2, y: py - 28, r: 10, got: false });
      x += pw + 3;
    } else if (r < 0.36) {
      // Question block
      qblocks.push({ x: x*TW, y: H - TW * 5, w: TW, h: TW, hit: false, bounce: 0 });
      x += 4;
    } else if (r < 0.52) {
      // Pipe
      const ph = 2 + (Math.random() * 2 | 0);
      pipes.push({ x: x*TW, y: H - TW*(2+ph), w: TW*2, h: TW*ph + TW*2 });
      if (Math.random() < 0.45 + lv * 0.1) spawnEnemy(x*TW + TW, H - TW*3, lv, enemies);
      x += 5;
    } else {
      if (Math.random() < 0.38 + lv * 0.08) spawnEnemy(x*TW, H - TW*3, lv, enemies);
      x += 5;
    }
  }

  // Goal flag
  const flagX = (LW - 5) * TW;

  // All solid tiles for collision (pipes too)
  const allSolid = [...solidGround, ...plats, ...pipes];

  return { LW, LPX, solidGround, plats, enemies, coinList, qblocks, pipes, flagX, allSolid };
}

function spawnEnemy(ex, ey, lv, arr) {
  arr.push({ x: ex, y: ey, w: 28, h: 24, vx: -1.3 * (1 + lv * 0.2), vy: 0, alive: true, stomp: false, stompT: 0 });
}

// ─── PLAYER ───
const PW = 24, PH = 32;
let P = {};
function resetPlayer() {
  P = { x: 80, y: H - TW*2 - PH, vx: 0, vy: 0, onG: false, dir: 1, wf: 0, wt: 0, jh: false, inv: 0, dead: false, dt: 0 };
}

function startGame() {
  ld = buildLevel(level);
  resetPlayer();
  camX = 0; parts = [];
  timer = Math.max(120, 300 - (level - 1) * 25); timerTick = 0;
  gs = 'play';
  elLv.textContent = level;
  elLi.textContent = lives;
  elTi.textContent = timer;
}

// ─── PARTICLES ───
function spawnParts(x, y, col, n = 7) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 4;
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 3, l: 1, col, r: 3 + Math.random()*4 });
  }
}

// ─── COLLISION ───
function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// Resolve one axis at a time against all tiles
function resolveX(rx, ry, rw, rh, tiles) {
  let x = rx, wall = false;
  for (const t of tiles) {
    if (!overlaps(x, ry, rw, rh, t.x, t.y, t.w, t.h)) continue;
    if (rx < t.x + t.w/2) { x = t.x - rw; } else { x = t.x + t.w; }
    wall = true;
  }
  return { x, wall };
}
function resolveY(rx, ry, rw, rh, tiles, velY) {
  let y = ry, onG = false, ceil = false;
  for (const t of tiles) {
    if (!overlaps(rx, y, rw, rh, t.x, t.y, t.w, t.h)) continue;
    if (velY >= 0 && ry + rh - velY <= t.y + 2) { y = t.y - rh; onG = true; }
    else { y = t.y + t.h; ceil = true; }
  }
  return { y, onG, ceil };
}

// ─── UPDATE ───
function update() {
  if (gs !== 'play') return;

  // Timer countdown
  timerTick++;
  if (timerTick >= 60) { timerTick = 0; timer = Math.max(0, timer - 1); elTi.textContent = timer; }
  if (timer === 0) killPlayer();

  // Particles
  parts = parts.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.l -= 0.033; p.r = Math.max(0, p.r - 0.08);
    return p.l > 0;
  });

  // Q block bounce animation
  ld.qblocks.forEach(q => { if (q.bounce < 0) q.bounce = Math.min(0, q.bounce + 2); });

  // Rising coins from Q blocks
  ld.coinList.forEach(c => {
    if (c.rise) { c.ry = (c.ry || 0) + 2.5; if (c.ry >= 38) c.rise = false; }
  });

  const p = P;

  // Dead animation
  if (p.dead) {
    p.dt++;
    p.vy += 0.45;
    p.y += p.vy;
    if (p.dt > 115) { lives--; elLi.textContent = lives; gs = 'dead'; }
    return;
  }

  if (p.inv > 0) p.inv--;

  // Movement
  const spd = isRun() ? 5.0 : 3.4, GRAV = 0.55, JUMP = -13.5;
  if (isL()) { p.vx = Math.max(p.vx - 0.65, -spd); p.dir = -1; }
  else if (isR()) { p.vx = Math.min(p.vx + 0.65,  spd); p.dir =  1; }
  else p.vx *= 0.78;

  // Jump
  if (isJ() && p.onG && !p.jh) { p.vy = JUMP; p.jh = true; sfxJump(); }
  if (!isJ()) p.jh = false;
  if (isJ() && p.vy < 0 && !p.onG) p.vy -= 0.28; // variable height

  p.vy = Math.min(p.vy + GRAV, 18);

  // Build solid list including Q blocks at bounced position
  const solids = [...ld.allSolid, ...ld.qblocks.map(q => ({ x: q.x, y: q.y + q.bounce, w: q.w, h: q.h }))];

  // Move X
  p.x += p.vx;
  const rx = resolveX(p.x, p.y, PW, PH, solids);
  p.x = rx.x;
  if (rx.wall) p.vx = 0;
  if (p.x < 0) { p.x = 0; p.vx = 0; }

  // Move Y
  p.y += p.vy;
  const ry = resolveY(p.x, p.y, PW, PH, solids, p.vy);
  p.y = ry.y;
  p.onG = ry.onG;
  if (ry.onG) p.vy = 0;
  if (ry.ceil) {
    p.vy = 1;
    // Check which Q block was hit from below
    ld.qblocks.forEach(q => {
      if (q.hit) return;
      const qy = q.y + q.bounce;
      if (overlaps(p.x, p.y, PW, PH, q.x, qy, q.w, q.h) && p.y > qy) {
        q.hit = true; q.bounce = -9;
        // Pop coin above block
        ld.coinList.push({ x: q.x + TW/2, y: q.y - 12, r: 10, got: false, rise: true, ry: 0 });
        addScore(100); addCoins(1); sfxCoin();
        spawnParts(q.x + TW/2, q.y, '#FFD700', 5);
      }
    });
  }

  // Walk animation
  if (Math.abs(p.vx) > 0.5 && p.onG) { p.wt++; if (p.wt > 7) { p.wt = 0; p.wf = (p.wf + 1) % 3; } }
  else p.wf = 0;

  // Fell off world
  if (p.y > H + 80) killPlayer();

  // Camera: target keeps player at 1/3 from left
  const target = p.x - W / 3;
  camX = Math.max(0, Math.min(ld.LPX - W, target));

  // Coin pickup
  ld.coinList.forEach(c => {
    if (c.got) return;
    const cy = c.y - (c.ry || 0);
    if (overlaps(p.x, p.y, PW, PH, c.x - c.r, cy - c.r, c.r*2, c.r*2)) {
      c.got = true; addScore(100); addCoins(1); sfxCoin();
      spawnParts(c.x, cy, '#FFD700', 4);
    }
  });

  // Enemies
  ld.enemies.forEach(e => {
    if (!e.alive) return;
    if (e.stomp) { e.stompT++; if (e.stompT > 20) e.alive = false; return; }

    e.vy = Math.min(e.vy + GRAV, 18);
    e.x += e.vx;
    const ex = resolveX(e.x, e.y, e.w, e.h, ld.allSolid);
    e.x = ex.x; if (ex.wall) e.vx *= -1;

    e.y += e.vy;
    const ey = resolveY(e.x, e.y, e.w, e.h, ld.allSolid, e.vy);
    e.y = ey.y; if (ey.onG) e.vy = 0;
    if (e.y > H + 80) { e.alive = false; return; }

    // Hit player?
    if (p.inv > 0) return;
    if (!overlaps(p.x, p.y, PW, PH, e.x, e.y, e.w, e.h)) return;

    // Stomp: player falling, player bottom above enemy center
    if (p.vy > 0 && p.y + PH < e.y + e.h * 0.6) {
      e.stomp = true; e.stompT = 0; e.h = 8;
      p.vy = -9;
      addScore(200);
      spawnParts(e.x + e.w/2, e.y, '#884400', 8);
      sfxStomp();
    } else {
      killPlayer();
    }
  });

  // Goal flag
  if (p.x + PW > ld.flagX && p.x < ld.flagX + 20) {
    addScore(timer * 10 + 500);
    gs = 'win'; level++;
    sfxClear();
  }
}

function addScore(n) { score += n; elSc.textContent = score; }
function addCoins(n) { coins += n; elCo.textContent = coins; }
function killPlayer() {
  if (P.dead) return;
  P.dead = true; P.vy = -14; P.vx = 0; sfxHurt();
}

// ─── DRAW ───
function draw() {
  // Sky
  const sg = ctx.createLinearGradient(0, 0, 0, H);
  sg.addColorStop(0, '#3A8FD8'); sg.addColorStop(1, '#87CEEB');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  // Clouds (parallax, no camX adjustment needed for scroll feel)
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  [80, 230, 410, 580, 750, 940, 1120].forEach((cx, i) => {
    const s = 1.8 + (i % 3) * 0.6;
    const ox = ((cx - camX * 0.28) % (W + 220) + W + 220) % (W + 220) - 110;
    const cy = 40 + (i % 3) * 22;
    ctx.beginPath();
    ctx.arc(ox,       cy,       18*s, 0, Math.PI*2);
    ctx.arc(ox+22*s,  cy-9*s,   13*s, 0, Math.PI*2);
    ctx.arc(ox+44*s,  cy,       16*s, 0, Math.PI*2);
    ctx.fill();
  });

  // Mountains (parallax)
  ctx.fillStyle = '#5B8C5A';
  [350, 700, 1100, 1600, 2100, 2700, 3300].forEach((mx, i) => {
    const mw = 160 + (i % 3) * 40;
    const mh = 240 + (i % 2) * 30;
    const ox = mx - camX * 0.45;
    if (ox < -mw || ox > W + mw) return;
    ctx.beginPath(); ctx.moveTo(ox - mw/2, H - 60); ctx.lineTo(ox, mh); ctx.lineTo(ox + mw/2, H - 60); ctx.fill();
    ctx.fillStyle = '#D8E4F0';
    ctx.beginPath(); ctx.moveTo(ox - 26, mh + 48); ctx.lineTo(ox, mh); ctx.lineTo(ox + 26, mh + 48); ctx.fill();
    ctx.fillStyle = '#5B8C5A';
  });

  if (!ld) return;

  // ── WORLD SPACE: apply camera transform ──
  ctx.save();
  ctx.translate(-camX, 0);

  // Ground
  ld.solidGround.forEach(t => {
    if (t.x + t.w < camX - 4 || t.x > camX + W + 4) return;
    ctx.fillStyle = '#7B3F10'; ctx.fillRect(t.x, t.y, t.w, t.h);
    ctx.fillStyle = '#4CAF50'; ctx.fillRect(t.x, t.y, t.w, 8);
    ctx.strokeStyle = '#2E7D0E'; ctx.lineWidth = 0.5; ctx.strokeRect(t.x, t.y, t.w, t.h);
  });

  // Platforms (bricks)
  ld.plats.forEach(t => {
    if (t.x + t.w < camX - 4 || t.x > camX + W + 4) return;
    ctx.fillStyle = '#C05818'; ctx.fillRect(t.x, t.y, t.w, t.h);
    ctx.strokeStyle = '#8B3A10'; ctx.lineWidth = 2;
    for (let bx = 0; bx < t.w; bx += 16)
      for (let by = 0; by < t.h; by += 8)
        ctx.strokeRect(t.x + bx + (by % 16 ? 8 : 0), t.y + by, 16, 8);
  });

  // Pipes
  ld.pipes.forEach(p => {
    if (p.x + p.w < camX - 4 || p.x > camX + W + 4) return;
    ctx.fillStyle = '#009900'; ctx.fillRect(p.x + 3, p.y + 20, p.w - 6, p.h - 20);
    ctx.fillStyle = '#00BB00'; ctx.fillRect(p.x, p.y, p.w, 22);
    ctx.fillStyle = '#00EE44'; ctx.fillRect(p.x + 5, p.y + 2, 8, p.h - 4);
    ctx.strokeStyle = '#005500'; ctx.lineWidth = 2;
    ctx.strokeRect(p.x, p.y, p.w, p.h); ctx.strokeRect(p.x, p.y, p.w, 22);
  });

  // Q blocks
  ld.qblocks.forEach(q => {
    if (q.x + q.w < camX - 4 || q.x > camX + W + 4) return;
    const qy = q.y + q.bounce;
    if (q.hit) {
      ctx.fillStyle = '#8B5500'; ctx.fillRect(q.x, qy, q.w, q.h);
    } else {
      ctx.fillStyle = '#FFB820'; ctx.fillRect(q.x, qy, q.w, q.h);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(q.x + 4, qy + 4, q.w - 8, q.h - 8);
      ctx.fillStyle = '#7B3D00'; ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center'; ctx.fillText('?', q.x + q.w/2, qy + q.h/2 + 7); ctx.textAlign = 'left';
    }
    ctx.strokeStyle = '#5C2E00'; ctx.lineWidth = 2; ctx.strokeRect(q.x, qy, q.w, q.h);
  });

  // Coins
  const ct = Date.now() / 200;
  ld.coinList.forEach(c => {
    if (c.got) return;
    const cy = c.y - (c.ry || 0);
    if (c.x + c.r < camX - 4 || c.x - c.r > camX + W + 4) return;
    const sx = Math.abs(Math.cos(ct + c.x * 0.01));
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.ellipse(c.x, cy, c.r * sx, c.r, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(c.x - 2*sx, cy - 2, 3*sx, 3, 0, 0, Math.PI*2); ctx.fill();
  });

  // Enemies
  ld.enemies.forEach(e => {
    if (!e.alive) return;
    if (e.x + e.w < camX - 4 || e.x > camX + W + 4) return;
    const eh = e.stomp ? 9 : e.h, ey = e.y + (e.h - eh);
    ctx.fillStyle = '#7B3800'; ctx.fillRect(e.x, ey, e.w, eh);
    if (!e.stomp) {
      ctx.fillStyle = '#FF2200'; ctx.fillRect(e.x + 3, ey + 3, 5, 5); ctx.fillRect(e.x + e.w - 8, ey + 3, 5, 5);
      ctx.fillStyle = '#000'; ctx.fillRect(e.x + 4, ey + 4, 3, 3); ctx.fillRect(e.x + e.w - 7, ey + 4, 3, 3);
      ctx.fillStyle = '#4A1A00'; ctx.fillRect(e.x, ey + eh - 7, 9, 7); ctx.fillRect(e.x + e.w - 9, ey + eh - 7, 9, 7);
    }
  });

  // Flag
  const fx = ld.flagX;
  ctx.fillStyle = '#888'; ctx.fillRect(fx, H - TW*8, 5, TW*6.5);
  const ft = Date.now() / 180;
  ctx.fillStyle = '#EE2222';
  ctx.beginPath();
  ctx.moveTo(fx + 5, H - TW*8);
  ctx.lineTo(fx + 5 + Math.sin(ft)*5 + 40, H - TW*8 + 18);
  ctx.lineTo(fx + 5 + Math.sin(ft + 0.5)*3, H - TW*8 + 36);
  ctx.fill();
  ctx.fillStyle = '#FFD700'; ctx.font = '16px sans-serif';
  ctx.fillText('⭐', fx + 8, H - TW*8 + 28);
  ctx.fillStyle = '#666'; ctx.fillRect(fx - 6, H - TW*2, 16, 8);

  // ── PLAYER (in world space) ──
  drawPlayer();

  // Particles
  parts.forEach(pt => {
    ctx.globalAlpha = pt.l;
    ctx.fillStyle = pt.col;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore(); // ← back to screen space

  // ── SCREEN SPACE HUD OVERLAY ──
  // Progress bar
  const prog = Math.min(1, P.x / Math.max(1, ld.flagX - 80));
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(W/2 - 100, 8, 200, 11);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(W/2 - 100, 8, 200 * prog, 11);
  ctx.strokeStyle = '#aa8800'; ctx.lineWidth = 1; ctx.strokeRect(W/2 - 100, 8, 200, 11);
  ctx.fillStyle = '#E8341C'; ctx.fillRect(W/2 - 100 + 200*prog - 3, 5, 6, 17);
  ctx.fillStyle = '#EE2222'; ctx.fillRect(W/2 + 103, 4, 9, 18);

  // Touch hint
  if (tL || tR || tJ) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    if (tL) ctx.fillRect(0, H*0.42, W/2, H*0.58);
    if (tR) ctx.fillRect(W/2, H*0.42, W/2, H*0.58);
    if (tJ) ctx.fillRect(0, 0, W, H*0.42);
  }

  // Overlay screens
  if (gs === 'start') drawScreen('⭐ SUPER CLAUDE BROS ⭐', '← → 移動  スペース/↑ ジャンプ  Shift ダッシュ', '? ブロックを叩いてコイン！敵は踏んで倒せ！', '#FFD700');
  if (gs === 'dead')  drawScreen('💀 MISS!', lives > 0 ? `残り ${lives} 機`, 'スペース / タップ でつづける', '#FF4444');
  if (gs === 'over')  drawScreen('GAME OVER', `スコア: ${score}`, 'スペース / タップ でリスタート', '#FF2222');
  if (gs === 'win')   drawScreen(`🎉 LEVEL ${level-1} CLEAR!`, `スコア: ${score}  コイン: ${coins}`, '次のレベルへ →', '#FFD700');
}

function drawPlayer() {
  const p = P;
  if (p.inv > 0 && Math.floor(p.inv / 4) % 2 === 0) return;

  // dead spin
  if (p.dead) {
    ctx.save();
    ctx.translate(p.x + PW/2, p.y + PH/2);
    ctx.rotate(p.dt * 0.18);
    ctx.fillStyle = '#DD2211'; ctx.fillRect(-PW/2, -PH/2, PW, PH);
    ctx.restore();
    return;
  }

  ctx.save();
  // Flip for direction
  if (p.dir === -1) {
    ctx.translate(p.x + PW/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-p.x - PW/2, 0);
  }

  const px = p.x, py = p.y;

  // Hat
  ctx.fillStyle = '#DD2211'; ctx.fillRect(px, py, PW, PH * 0.34);
  // Brim
  ctx.fillRect(px - 4, py + PH*0.32, PW + 8, 7);
  // Face
  ctx.fillStyle = '#FFD5A0'; ctx.fillRect(px, py + PH*0.28, PW, PH * 0.42);
  // Eye
  ctx.fillStyle = '#000'; ctx.fillRect(px + PW - 9, py + PH*0.34, 5, 4);
  // Mustache
  ctx.fillStyle = '#4A2000'; ctx.fillRect(px + PW - 15, py + PH*0.52, 13, 4);
  // Overalls
  ctx.fillStyle = '#1A5CCC'; ctx.fillRect(px + 2, py + PH*0.65, PW - 4, PH*0.35);
  // Overall buckles
  ctx.fillStyle = '#FFD700'; ctx.fillRect(px + 5, py + PH*0.66, 4, 4); ctx.fillRect(px + PW - 9, py + PH*0.66, 4, 4);

  // Legs with walk animation
  const lo = p.onG && Math.abs(p.vx) > 0.5 ? [[-3, 3], [0, 0], [3, -3]][p.wf] : [0, 0];
  ctx.fillStyle = '#0A2E99';
  ctx.fillRect(px + 2 + lo[0], py + PH - 10, PW/2 - 3, 11);
  ctx.fillRect(px + PW/2 + 1 + lo[1], py + PH - 10, PW/2 - 3, 11);
  // Shoes
  ctx.fillStyle = '#4A2000';
  ctx.fillRect(px + lo[0] - 1, py + PH - 4, PW/2 + 2, 6);
  ctx.fillRect(px + PW/2 - 1 + lo[1], py + PH - 4, PW/2 + 3, 6);

  ctx.restore();
}

function drawScreen(title, sub, hint, col) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = col; ctx.font = 'bold 40px monospace'; ctx.fillText(title, W/2, H/2 - 50);
  ctx.fillStyle = '#fff'; ctx.font = '17px monospace'; ctx.fillText(sub, W/2, H/2 + 5);
  ctx.fillStyle = '#ccc'; ctx.font = '14px monospace'; ctx.fillText(hint, W/2, H/2 + 34);
  if (Math.floor(Date.now()/550) % 2) {
    ctx.fillStyle = col; ctx.font = 'bold 16px monospace';
    ctx.fillText('[ スペース / タップ ]', W/2, H/2 + 70);
  }
  ctx.textAlign = 'left';
}

// ─── MAIN LOOP ───
ld = buildLevel(level);
resetPlayer();

function loop() {
  requestAnimationFrame(loop);
  update();
  draw();
}
loop();
</script>
</body>
</html>
