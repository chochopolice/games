<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moustache.</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a0a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
h1 {
  color: #FFD700;
  font-size: 22px;
  font-weight: bold;
  text-shadow: 2px 2px 0 #FF4500, 4px 4px 0 #8B0000;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
#hud {
  display: flex;
  gap: 30px;
  color: #fff;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 6px;
}
#hud span { display: flex; flex-direction: column; align-items: center; }
.lbl { font-size: 10px; color: #aaa; }
.val { font-size: 18px; color: #FFD700; }
canvas {
  border: 3px solid #FFD700;
  box-shadow: 0 0 24px rgba(255,215,0,0.4);
  display: block;
  max-width: 100vw;
}
#ctrl {
  color: #666;
  font-size: 11px;
  margin-top: 6px;
  text-align: center;
  line-height: 1.8;
}
</style>
</head>
<body>

<h1>&#11088; MOUSTACHE &#11088;</h1>
<div id="hud">
  <span><div class="lbl">SCORE</div><div class="val" id="elSc">0</div></span>
  <span><div class="lbl">COINS</div><div class="val" id="elCo">0</div></span>
  <span><div class="lbl">LIVES</div><div class="val" id="elLi">3</div></span>
  <span><div class="lbl">LEVEL</div><div class="val" id="elLv">1</div></span>
  <span><div class="lbl">TIME</div><div class="val" id="elTi">300</div></span>
</div>
<canvas id="c" width="768" height="400"></canvas>
<div id="ctrl">
  &#8592; &#8594; &#31227;&#21205; | &#12473;&#12506;&#12540;&#12473; / &#8593; &#12472;&#12515;&#12531;&#12503; | Shift &#12480;&#12483;&#12471;&#12517;<br>
  &#12514;&#12496;&#12452;&#12523;: &#5DE6;&#12479;&#12483;&#12503;&#31227;&#21205;&#12289;&#53440;&#12479;&#12483;&#12503;&#31227;&#21205;&#12289;&#19978;&#12479;&#12483;&#12503;&#12472;&#12515;&#12531;&#12503;
</div>

<script>
var cv  = document.getElementById('c');
var ctx = cv.getContext('2d');
var W = 768, H = 400;

var elSc = document.getElementById('elSc');
var elCo = document.getElementById('elCo');
var elLi = document.getElementById('elLi');
var elLv = document.getElementById('elLv');
var elTi = document.getElementById('elTi');

/* ---- AUDIO ---- */
var audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, dur, vol, type) {
  try {
    var ac = getAC();
    var o = ac.createOscillator();
    var g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.25, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sfxJump()  { tone(380, 0.08); setTimeout(function(){ tone(560, 0.10); }, 60); }
function sfxCoin()  { tone(880, 0.07, 0.2, 'sine'); setTimeout(function(){ tone(1320, 0.10, 0.15, 'sine'); }, 55); }
function sfxStomp() { tone(260, 0.09); setTimeout(function(){ tone(180, 0.12); }, 60); }
function sfxHurt()  { tone(120, 0.22, 0.35, 'sawtooth'); }
function sfxClear() {
  var ff = [400, 500, 630, 800, 1000];
  for (var i = 0; i < ff.length; i++) {
    (function(f,d){ setTimeout(function(){ tone(f, 0.12, 0.2, 'sine'); }, d); })(ff[i], i*70);
  }
}
function sfxMushroom() { tone(500,0.08,0.3,'sine'); setTimeout(function(){ tone(700,0.12,0.25,'sine'); },80); setTimeout(function(){ tone(900,0.15,0.2,'sine'); },160); }
function sfxStar()     { var ff=[600,800,1000,1200,1000,800]; ff.forEach(function(f,i){ setTimeout(function(){ tone(f,0.06,0.3,'sine'); },i*55); }); }
function sfxOneUp()    { var ff=[520,660,780,1040]; ff.forEach(function(f,i){ setTimeout(function(){ tone(f,0.10,0.3,'sine'); },i*80); }); }
function sfxThrow()    { tone(600,0.05,0.15,'sine'); setTimeout(function(){ tone(400,0.08,0.10,'sine'); },50); }
function sfxFireball() { tone(700,0.04,0.10,'sine'); }
function sfxEnemyShoot(){ tone(220,0.06,0.08,'sine'); setTimeout(function(){ tone(180,0.05,0.06,'sine'); },60); }

/* ---- INPUT ---- */
var keys = {};
var tL = false, tR = false, tJ = false;

document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) >= 0) e.preventDefault();
  if (gs !== 'play') doAction();
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (gs !== 'play') { doAction(); return; }
  var r = cv.getBoundingClientRect();
  var sx = W / r.width, sy = H / r.height;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    var tx = (t.clientX - r.left) * sx;
    var ty = (t.clientY - r.top)  * sy;
    if (ty < H * 0.42) tJ = true;
    else if (tx < W / 2) tL = true;
    else tR = true;
  }
}, { passive: false });
cv.addEventListener('touchend', function(e) {
  e.preventDefault();
  tL = false; tR = false; tJ = false;
}, { passive: false });

function isL()   { return !!(keys['ArrowLeft']  || keys['KeyA'] || tL); }
function isR()   { return !!(keys['ArrowRight'] || keys['KeyD'] || tR); }
function isJ()   { return !!(keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || tJ); }
function isRun() { return !!(keys['ShiftLeft'] || keys['ShiftRight']); }
function isThrow() { return !!(keys['KeyZ'] || keys['KeyF']); }

/* ---- GAME STATE ---- */
var gs    = 'start';
var score = 0, coins = 0, lives = 3, level = 1;
var timer = 300, timerTick = 0;
var camX  = 0;
var parts = [];
var popups = [];
var ld    = null;

var TW = 32, PW = 24, PH = 32;
var GRAV = 0.55, VMAX = 18;

function doAction() {
  if (gs === 'start' || gs === 'win') { startGame(); return; }
  if (gs === 'dead') { if (lives > 0) startGame(); else gs = 'over'; return; }
  if (gs === 'over') { score = 0; coins = 0; lives = 3; level = 1; startGame(); }
}

/* ---- LEVEL ---- */
function buildLevel(lv) {
  var LW = 175, LPX = LW * TW;
  var solidGround = [], plats = [], enemies = [], coinList = [], qblocks = [], pipes = [], items = [], projectiles = [];

  for (var gx = 0; gx < LW; gx++) {
    solidGround.push({ x: gx*TW, y: H-TW,   w: TW, h: TW });
    solidGround.push({ x: gx*TW, y: H-TW*2, w: TW, h: TW });
  }

  var gapCols = {};
  var gs2 = [52, 78, 108, 132, 152];
  var gapW = 4 + (lv > 1 ? 1 : 0);
  for (var gi = 0; gi < gs2.length; gi++) {
    for (var gd = 0; gd < gapW; gd++) gapCols[gs2[gi] + gd] = 1;
  }
  solidGround = solidGround.filter(function(t) { return !gapCols[Math.floor(t.x / TW)]; });

  var x = 8;
  while (x < LW - 12) {
    var r = Math.random();
    if (r < 0.18) {
      var pw = 3 + Math.floor(Math.random() * 3);
      var py = H - TW * (4 + Math.floor(Math.random() * 3));
      plats.push({ x: x*TW, y: py, w: pw*TW, h: TW });
      for (var ci = 0; ci < pw; ci++)
        coinList.push({ x: x*TW + ci*TW + TW/2, y: py - 28, r: 10, got: false });
      x += pw + 3;
    } else if (r < 0.34) {
      var itypes = ['coin','coin','coin','mushroom','mushroom','star','1up'];
      if (lv >= 10) itypes.push('flower', 'flower'); /* Lv10〜ファイアフラワー */
      qblocks.push({ x: x*TW, y: H - TW*5, w: TW, h: TW, hit: false, bounce: 0,
                     itemType: itypes[Math.floor(Math.random()*itypes.length)] });
      x += 4;
    } else if (r < 0.50) {
      var ph = 2 + Math.floor(Math.random() * 2);
      pipes.push({ x: x*TW, y: H - TW*(2+ph), w: TW*2, h: TW*ph + TW*2 });
      if (Math.random() < 0.4 + lv * 0.1) {
        if (lv >= 5 && Math.random() < 0.45)
          enemies.push(makeThrower((x+0.5)*TW, H-TW*3, lv));
        else
          enemies.push({ type:'normal', x: (x+0.5)*TW, y: H-TW*3, w: 28, h: 24, vx: -1.2*(1+lv*0.2), vy: 0, alive: true, stomp: false, stompT: 0 });
      }
      x += 5;
    } else {
      if (Math.random() < 0.35 + lv * 0.08) {
        if (lv >= 5 && Math.random() < 0.4)
          enemies.push(makeThrower(x*TW, H-TW*3, lv));
        else
          enemies.push({ type:'normal', x: x*TW, y: H-TW*3, w: 28, h: 24, vx: -1.2*(1+lv*0.2), vy: 0, alive: true, stomp: false, stompT: 0 });
      }
      x += 5;
    }
  }

  return {
    LPX: LPX,
    solidGround: solidGround,
    plats: plats,
    enemies: enemies,
    coinList: coinList,
    qblocks: qblocks,
    pipes: pipes,
    items: items,
    projectiles: projectiles,
    allSolid: solidGround.concat(plats).concat(pipes),
    flagX: (LW - 5) * TW
  };
}

function makeThrower(ex, ey, lv) {
  return { type:'thrower', x: ex, y: ey, w: 26, h: 26,
           vx: -(0.4 + lv*0.08), vy: 0, alive: true, stomp: false, stompT: 0,
           shootCd: Math.floor(Math.random()*120),
           shootInterval: Math.max(70, 160 - lv*8) };
}

/* ---- PLAYER ---- */
var P = {};
function resetPlayer() {
  P = { x: 80, y: H - TW*2 - PH, vx: 0, vy: 0,
        onG: false, dir: 1, wf: 0, wt: 0,
        jh: false, inv: 0, dead: false, dt: 0,
        big: false, star: 0, starColor: 0,
        hasFlower: false, throwCd: 0, throwHeld: false };
}

function startGame() {
  ld = buildLevel(level);
  resetPlayer();
  camX = 0; parts = []; popups = [];
  timer = Math.max(120, 300 - (level-1)*25);
  timerTick = 0;
  gs = 'play';
  elLv.textContent = level;
  elLi.textContent = lives;
  elTi.textContent = timer;
  elSc.textContent = score;
  elCo.textContent = coins;
}

/* ---- PARTICLES ---- */
function spawnParts(x, y, col, n) {
  for (var i = 0; i < (n||7); i++) {
    var a = Math.random() * Math.PI * 2;
    var s = 2 + Math.random() * 4;
    parts.push({ x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3, life:1, col:col, r:3+Math.random()*4 });
  }
}

/* ---- COLLISION ---- */
function overlaps(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function resolveX(rx,ry,rw,rh, tiles) {
  var x = rx, wall = false;
  for (var i = 0; i < tiles.length; i++) {
    var t = tiles[i];
    if (!overlaps(x,ry,rw,rh, t.x,t.y,t.w,t.h)) continue;
    x = (rx < t.x + t.w/2) ? t.x - rw : t.x + t.w;
    wall = true;
  }
  return { x:x, wall:wall };
}
function resolveY(rx,ry,rw,rh, tiles, velY) {
  var y = ry, onG = false, ceil = false;
  for (var i = 0; i < tiles.length; i++) {
    var t = tiles[i];
    if (!overlaps(rx,y,rw,rh, t.x,t.y,t.w,t.h)) continue;
    if (velY >= 0 && ry + rh - velY <= t.y + 4) { y = t.y - rh; onG = true; }
    else { y = t.y + t.h; ceil = true; }
  }
  return { y:y, onG:onG, ceil:ceil };
}

/* ---- HELPER ---- */
function addScore(n) { score += n; elSc.textContent = score; }
function addCoins(n) { coins += n; elCo.textContent = coins; }
function killPlayer() {
  if (P.dead) return;
  P.dead = true; P.vy = -14; P.vx = 0; sfxHurt();
}

/* floating popup text */
var popups = [];
function showPopup(txt, x, y) {
  popups.push({ txt: txt, x: x, y: y, life: 1.0 });
}

/* ---- UPDATE ---- */
function update() {
  if (gs !== 'play') return;

  timerTick++;
  if (timerTick >= 60) {
    timerTick = 0;
    timer = Math.max(0, timer - 1);
    elTi.textContent = timer;
    if (timer === 0) killPlayer();
  }

  var np = [];
  for (var i = 0; i < parts.length; i++) {
    var pt = parts[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.3; pt.life -= 0.033; pt.r = Math.max(0, pt.r - 0.08);
    if (pt.life > 0) np.push(pt);
  }
  parts = np;

  var npop = [];
  for (var i = 0; i < popups.length; i++) {
    var pp2 = popups[i]; pp2.y -= 1.2; pp2.life -= 0.022;
    if (pp2.life > 0) npop.push(pp2);
  }
  popups = npop;

  for (var qi = 0; qi < ld.qblocks.length; qi++) {
    var q = ld.qblocks[qi];
    if (q.bounce < 0) q.bounce = Math.min(0, q.bounce + 2);
  }
  for (var ci = 0; ci < ld.coinList.length; ci++) {
    var cn = ld.coinList[ci];
    if (cn.rise) { cn.ry = (cn.ry||0) + 2.5; if (cn.ry >= 38) cn.rise = false; }
  }

  var p = P;

  if (p.dead) {
    p.dt++; p.vy += 0.45; p.y += p.vy;
    if (p.dt > 115) { lives--; elLi.textContent = lives; gs = 'dead'; }
    return;
  }
  if (p.inv > 0) p.inv--;

  var spd = isRun() ? 5.0 : 3.4;
  if (isL())      { p.vx = Math.max(p.vx - 0.65, -spd); p.dir = -1; }
  else if (isR()) { p.vx = Math.min(p.vx + 0.65,  spd); p.dir =  1; }
  else            { p.vx *= 0.78; }

  if (isJ() && p.onG && !p.jh) { p.vy = -13.5; p.jh = true; sfxJump(); }
  if (!isJ()) p.jh = false;
  if (isJ() && p.vy < 0 && !p.onG) p.vy -= 0.28;
  p.vy = Math.min(p.vy + GRAV, VMAX);

  /* build solid list with Q blocks at bounced y */
  var solids = ld.allSolid.slice();
  for (var qi2 = 0; qi2 < ld.qblocks.length; qi2++) {
    var qb = ld.qblocks[qi2];
    solids.push({ x: qb.x, y: qb.y + qb.bounce, w: qb.w, h: qb.h });
  }

  p.x += p.vx;
  var rx = resolveX(p.x, p.y, PW, PH, solids);
  p.x = rx.x; if (rx.wall) p.vx = 0;
  if (p.x < 0) { p.x = 0; p.vx = 0; }

  p.y += p.vy;
  var ry = resolveY(p.x, p.y, PW, PH, solids, p.vy);
  p.y = ry.y; p.onG = ry.onG;
  if (p.onG) p.vy = 0;
  if (ry.ceil) {
    p.vy = 1;
    for (var qi3 = 0; qi3 < ld.qblocks.length; qi3++) {
      var qc = ld.qblocks[qi3];
      if (qc.hit) continue;
      var qcy = qc.y + qc.bounce;
      var xHit = p.x + PW > qc.x && p.x < qc.x + qc.w;
        var yHit = Math.abs(p.y - (qcy + qc.h)) < 6;
        if (xHit && yHit) {
        qc.hit = true; qc.bounce = -9;
        spawnParts(qc.x + TW/2, qc.y, '#FFD700', 5);
        if (qc.itemType === 'coin') {
          ld.coinList.push({ x: qc.x + TW/2, y: qc.y - 12, r: 10, got: false, rise: true, ry: 0 });
          addScore(100); addCoins(1); sfxCoin();
        } else {
          /* spawn power-up item rising out of block */
          ld.items.push({
            x: qc.x + 2, y: qc.y - TW,
            w: TW - 4, h: TW - 4,
            type: qc.itemType,
            vx: 1.5, vy: 0,
            active: true,
            rising: true, riseTarget: qc.y - TW - 4
          });
          sfxMushroom();
        }
      }
    }
  }

  if (Math.abs(p.vx) > 0.5 && p.onG) { p.wt++; if (p.wt > 7) { p.wt = 0; p.wf = (p.wf+1)%3; } }
  else p.wf = 0;

  /* star timer */
  if (p.star > 0) { p.star--; p.starColor = (p.starColor + 1) % 6; }

  /* items update */
  for (var ii = 0; ii < ld.items.length; ii++) {
    var it = ld.items[ii];
    if (!it.active) continue;

    /* rise out of block */
    if (it.rising) {
      it.y -= 2;
      if (it.y <= it.riseTarget) { it.rising = false; }
      continue;
    }

    /* gravity (stars bounce, mushrooms roll) */
    it.vy = Math.min(it.vy + GRAV, VMAX);
    it.x += it.vx;
    var itx = resolveX(it.x, it.y, it.w, it.h, ld.allSolid);
    it.x = itx.x; if (itx.wall) it.vx = -it.vx;
    it.y += it.vy;
    var ity = resolveY(it.x, it.y, it.w, it.h, ld.allSolid, it.vy);
    it.y = ity.y;
    if (ity.onG) {
      if (it.type === 'star') { it.vy = -10; } /* star bounces */
      else it.vy = 0;
    }
    if (it.y > H + 80) { it.active = false; continue; }

    /* player pickup */
    if (overlaps(p.x, p.y, PW, PH, it.x, it.y, it.w, it.h)) {
      it.active = false;
      spawnParts(it.x + it.w/2, it.y + it.h/2,
        it.type==='star'?'#FFD700':it.type==='1up'?'#00FF44':'#FF4444', 10);
      if (it.type === 'mushroom') {
        p.big = true; p.inv = 60; addScore(1000);
        sfxMushroom();
        showPopup('+1000 BIG!', it.x, it.y);
      } else if (it.type === 'star') {
        p.star = 600; p.inv = 600; addScore(1000);
        sfxStar();
        showPopup('+1000 STAR!', it.x, it.y);
      } else if (it.type === '1up') {
        lives++; elLi.textContent = lives;
        sfxOneUp();
        showPopup('1UP!!', it.x, it.y);
      } else if (it.type === 'flower') {
        p.hasFlower = true; addScore(1000);
        sfxMushroom();
        showPopup('FIRE! (Z key)', it.x, it.y);
      }
    }
  }

  if (p.y > H + 80) killPlayer();

  camX = Math.max(0, Math.min(ld.LPX - W, p.x - W/3));

  for (var ci2 = 0; ci2 < ld.coinList.length; ci2++) {
    var c = ld.coinList[ci2];
    if (c.got) continue;
    var ccy = c.y - (c.ry||0);
    if (overlaps(p.x, p.y, PW, PH, c.x-c.r, ccy-c.r, c.r*2, c.r*2)) {
      c.got = true; addCoins(1); addScore(100); sfxCoin();
      spawnParts(c.x, ccy, '#FFD700', 4);
    }
  }

  /* ---- プレイヤー投擲 ---- */
  if (p.throwCd > 0) p.throwCd--;
  if (isThrow() && !p.throwHeld && p.hasFlower && p.throwCd <= 0) {
    p.throwHeld = true; p.throwCd = 22;
    ld.projectiles.push({
      owner: 'player', x: p.x + (p.dir > 0 ? PW : 0), y: p.y + PH * 0.4,
      vx: p.dir * 7, vy: -3.5, r: 6, active: true, bounces: 0
    });
    sfxThrow();
  }
  if (!isThrow()) p.throwHeld = false;

  /* ---- 敵 ---- */
  for (var ei = 0; ei < ld.enemies.length; ei++) {
    var e = ld.enemies[ei];
    if (!e.alive) continue;
    if (e.stomp) { e.stompT++; if (e.stompT > 20) e.alive = false; continue; }
    e.vy = Math.min(e.vy + GRAV, VMAX);
    e.x += e.vx;
    var exx = resolveX(e.x, e.y, e.w, e.h, ld.allSolid);
    e.x = exx.x; if (exx.wall) e.vx = -e.vx;
    e.y += e.vy;
    var eyy = resolveY(e.x, e.y, e.w, e.h, ld.allSolid, e.vy);
    e.y = eyy.y; if (eyy.onG) e.vy = 0;
    if (e.y > H + 80) { e.alive = false; continue; }

    /* 投擲敵: 着地中にプレイヤーへ向けて発射 */
    if (e.type === 'thrower' && eyy.onG) {
      /* 画面内の敵だけ発射（画面外はサウンドも出さない） */
      if (e.x + e.w > camX - 32 && e.x < camX + W + 32) {
        e.shootCd--;
        if (e.shootCd <= 0) {
          e.shootCd = e.shootInterval;
          var dx = p.x - e.x, dy = p.y - e.y;
          var dist = Math.sqrt(dx*dx + dy*dy) || 1, spd = 5;
          ld.projectiles.push({
            owner: 'enemy', x: e.x + e.w/2, y: e.y + e.h/2,
            vx: dx/dist*spd, vy: dy/dist*spd - 1,
            r: 6, active: true, bounces: 0
          });
          sfxEnemyShoot();
        }
      }
    }

    if (p.inv > 0 || !overlaps(p.x, p.y, PW, PH, e.x, e.y, e.w, e.h)) continue;
    if (p.vy > 0 && p.y + PH < e.y + e.h * 0.55) {
      e.stomp = true; e.stompT = 0; e.h = 8;
      p.vy = -9; addScore(200);
      spawnParts(e.x + e.w/2, e.y, '#884400', 8); sfxStomp();
      showPopup('+200', e.x + e.w/2, e.y);
    } else if (p.star > 0) {
      e.stomp = true; e.stompT = 0; e.h = 8;
      addScore(500); spawnParts(e.x + e.w/2, e.y, '#FFD700', 10); sfxStomp();
      showPopup('+500 STAR!', e.x + e.w/2, e.y);
    } else if (p.big) {
      p.big = false; p.inv = 120; sfxHurt();
    } else { killPlayer(); }
  }

  /* ---- 弾 ---- */
  for (var pbi = 0; pbi < ld.projectiles.length; pbi++) {
    var pb = ld.projectiles[pbi];
    if (!pb.active) continue;
    pb.vy += GRAV * 0.6;
    pb.x += pb.vx; pb.y += pb.vy;
    var pbry = resolveY(pb.x-pb.r, pb.y-pb.r, pb.r*2, pb.r*2, ld.allSolid, pb.vy);
    if (pbry.onG) {
      if (pb.owner === 'player') { pb.vy = -6; pb.bounces++; if (pb.bounces > 4) pb.active = false; sfxFireball(); }
      else { pb.active = false; }
    }
    if (pbry.ceil) pb.vy = Math.abs(pb.vy);
    var pbrx = resolveX(pb.x-pb.r, pb.y-pb.r, pb.r*2, pb.r*2, ld.allSolid);
    if (pbrx.wall) pb.active = false;
    if (pb.x < camX-30 || pb.x > camX+W+30 || pb.y > H+50) pb.active = false;
    if (pb.owner === 'player') {
      for (var ei2 = 0; ei2 < ld.enemies.length; ei2++) {
        var e2 = ld.enemies[ei2];
        if (!e2.alive || e2.stomp) continue;
        if (overlaps(pb.x-pb.r, pb.y-pb.r, pb.r*2, pb.r*2, e2.x, e2.y, e2.w, e2.h)) {
          pb.active = false; e2.stomp = true; e2.stompT = 0; e2.h = 8;
          addScore(300); spawnParts(e2.x+e2.w/2, e2.y, '#FF8800', 10); sfxStomp();
          showPopup('+300', e2.x+e2.w/2, e2.y);
        }
      }
    }
    if (pb.owner === 'enemy' && p.inv <= 0) {
      if (overlaps(pb.x-pb.r, pb.y-pb.r, pb.r*2, pb.r*2, p.x, p.y, PW, PH)) {
        pb.active = false;
        if (p.star > 0) { /* 無敵中は無効 */ }
        else if (p.big) { p.big = false; p.inv = 120; sfxHurt(); }
        else { killPlayer(); }
      }
    }
  }
  ld.projectiles = ld.projectiles.filter(function(pb){ return pb.active; });

  if (p.x + PW > ld.flagX && p.x < ld.flagX + 20) {
    addScore(timer * 10 + 500); gs = 'win'; level++; sfxClear();
  }
}

/* ---- DRAW ---- */
function draw() {
  /* sky */
  var sg = ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#3A8FD8'); sg.addColorStop(1,'#87CEEB');
  ctx.fillStyle = sg; ctx.fillRect(0,0,W,H);

  /* clouds */
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  var cds = [[80,50,2.2],[240,38,1.8],[420,60,2.8],[600,44,2.0],[790,55,2.5],[980,40,1.9]];
  for (var ci = 0; ci < cds.length; ci++) {
    var cd = cds[ci], cs = cd[2];
    var ox = ((cd[0] - camX*0.28) % (W+220) + W+220) % (W+220) - 110;
    ctx.beginPath();
    ctx.arc(ox,       cd[1],       18*cs, 0, Math.PI*2);
    ctx.arc(ox+22*cs, cd[1]-9*cs,  13*cs, 0, Math.PI*2);
    ctx.arc(ox+44*cs, cd[1],       16*cs, 0, Math.PI*2);
    ctx.fill();
  }

  /* mountains */
  var mds = [[350,260,170],[720,275,150],[1100,255,200],[1600,265,175],[2100,270,190],[2700,258,165]];
  for (var mi = 0; mi < mds.length; mi++) {
    var md = mds[mi], mox = md[0] - camX*0.45;
    if (mox < -md[2] || mox > W+md[2]) continue;
    ctx.fillStyle='#5B8C5A'; ctx.beginPath();
    ctx.moveTo(mox-md[2]/2,H-60); ctx.lineTo(mox,md[1]); ctx.lineTo(mox+md[2]/2,H-60); ctx.fill();
    ctx.fillStyle='#D8E4F0'; ctx.beginPath();
    ctx.moveTo(mox-26,md[1]+48); ctx.lineTo(mox,md[1]); ctx.lineTo(mox+26,md[1]+48); ctx.fill();
  }

  if (!ld) return;

  /* ---- world space ---- */
  ctx.save();
  ctx.translate(-camX, 0);

  /* ground */
  for (var i = 0; i < ld.solidGround.length; i++) {
    var t = ld.solidGround[i];
    if (t.x+t.w < camX-4 || t.x > camX+W+4) continue;
    ctx.fillStyle='#7B3F10'; ctx.fillRect(t.x,t.y,t.w,t.h);
    ctx.fillStyle='#4CAF50'; ctx.fillRect(t.x,t.y,t.w,8);
    ctx.strokeStyle='#2E7D0E'; ctx.lineWidth=0.5; ctx.strokeRect(t.x,t.y,t.w,t.h);
  }
  /* platforms */
  for (var i = 0; i < ld.plats.length; i++) {
    var t = ld.plats[i];
    if (t.x+t.w < camX-4 || t.x > camX+W+4) continue;
    ctx.fillStyle='#C05818'; ctx.fillRect(t.x,t.y,t.w,t.h);
    ctx.strokeStyle='#8B3A10'; ctx.lineWidth=2;
    for (var bx=0; bx<t.w; bx+=16) for (var by=0; by<t.h; by+=8)
      ctx.strokeRect(t.x+bx+(by%16?8:0), t.y+by, 16, 8);
  }
  /* pipes */
  for (var i = 0; i < ld.pipes.length; i++) {
    var pp = ld.pipes[i];
    if (pp.x+pp.w < camX-4 || pp.x > camX+W+4) continue;
    ctx.fillStyle='#009900'; ctx.fillRect(pp.x+3, pp.y+20, pp.w-6, pp.h-20);
    ctx.fillStyle='#00BB00'; ctx.fillRect(pp.x, pp.y, pp.w, 22);
    ctx.fillStyle='#00EE44'; ctx.fillRect(pp.x+5, pp.y+2, 8, pp.h-4);
    ctx.strokeStyle='#005500'; ctx.lineWidth=2;
    ctx.strokeRect(pp.x,pp.y,pp.w,pp.h); ctx.strokeRect(pp.x,pp.y,pp.w,22);
  }
  /* Q blocks */
  for (var i = 0; i < ld.qblocks.length; i++) {
    var qb = ld.qblocks[i];
    if (qb.x+qb.w < camX-4 || qb.x > camX+W+4) continue;
    var qy = qb.y + qb.bounce;
    if (qb.hit) {
      ctx.fillStyle='#8B5500'; ctx.fillRect(qb.x,qy,qb.w,qb.h);
    } else {
      ctx.fillStyle='#FFB820'; ctx.fillRect(qb.x,qy,qb.w,qb.h);
      ctx.fillStyle='#FFD700'; ctx.fillRect(qb.x+4,qy+4,qb.w-8,qb.h-8);
      ctx.fillStyle='#7B3D00'; ctx.font='bold 18px monospace';
      ctx.textAlign='center'; ctx.fillText('?',qb.x+qb.w/2,qy+qb.h/2+7); ctx.textAlign='left';
    }
    ctx.strokeStyle='#5C2E00'; ctx.lineWidth=2; ctx.strokeRect(qb.x,qy,qb.w,qb.h);
  }
  /* coins */
  var ct = Date.now()/200;
  for (var i = 0; i < ld.coinList.length; i++) {
    var c = ld.coinList[i];
    if (c.got) continue;
    var ccy = c.y - (c.ry||0);
    if (c.x+c.r < camX-4 || c.x-c.r > camX+W+4) continue;
    var sx = Math.abs(Math.cos(ct + c.x*0.01));
    ctx.fillStyle='#FFD700'; ctx.beginPath();
    ctx.ellipse(c.x, ccy, c.r*sx, c.r, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.beginPath();
    ctx.ellipse(c.x-2*sx, ccy-2, Math.max(0.5,3*sx), 3, 0, 0, Math.PI*2); ctx.fill();
  }
  /* items (mushroom / star / 1up) */
  for (var i = 0; i < ld.items.length; i++) {
    var it = ld.items[i];
    if (!it.active) continue;
    if (it.x+it.w < camX-4 || it.x > camX+W+4) continue;
    if (it.type === 'mushroom') {
      /* red mushroom body */
      ctx.fillStyle = '#EE1111';
      ctx.beginPath(); ctx.arc(it.x+it.w/2, it.y+it.h*0.45, it.w*0.52, Math.PI, 0); ctx.fill();
      /* white spots */
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(it.x+it.w/2, it.y+it.h*0.28, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(it.x+it.w*0.22, it.y+it.h*0.38, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(it.x+it.w*0.78, it.y+it.h*0.38, 4, 0, Math.PI*2); ctx.fill();
      /* stem */
      ctx.fillStyle = '#FFD5A0';
      ctx.fillRect(it.x+it.w*0.2, it.y+it.h*0.45, it.w*0.6, it.h*0.55);
      /* eyes */
      ctx.fillStyle = '#000';
      ctx.fillRect(it.x+it.w*0.3, it.y+it.h*0.55, 4, 4);
      ctx.fillRect(it.x+it.w*0.62, it.y+it.h*0.55, 4, 4);
    } else if (it.type === 'star') {
      var sc = it.x + it.w/2, sr = it.y + it.h/2, ss = it.w/2;
      var st = Date.now()/80;
      ctx.fillStyle = ['#FFD700','#FF8800','#FFD700','#FFFF00'][Math.floor(Date.now()/100)%4];
      ctx.beginPath();
      for (var sp = 0; sp < 5; sp++) {
        var ang = sp * Math.PI*2/5 - Math.PI/2 + Math.sin(st)*0.3;
        var ang2 = ang + Math.PI/5;
        if (sp===0) ctx.moveTo(sc+Math.cos(ang)*ss, sr+Math.sin(ang)*ss);
        else ctx.lineTo(sc+Math.cos(ang)*ss, sr+Math.sin(ang)*ss);
        ctx.lineTo(sc+Math.cos(ang2)*ss*0.45, sr+Math.sin(ang2)*ss*0.45);
      }
      ctx.closePath(); ctx.fill();
    } else if (it.type === '1up') {
      /* green mushroom */
      ctx.fillStyle = '#00BB00';
      ctx.beginPath(); ctx.arc(it.x+it.w/2, it.y+it.h*0.45, it.w*0.52, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(it.x+it.w/2, it.y+it.h*0.28, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(it.x+it.w*0.22, it.y+it.h*0.38, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(it.x+it.w*0.78, it.y+it.h*0.38, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#CCF0CC';
      ctx.fillRect(it.x+it.w*0.2, it.y+it.h*0.45, it.w*0.6, it.h*0.55);
      ctx.fillStyle = '#004400'; ctx.font = 'bold 11px monospace'; ctx.textAlign='center';
      ctx.fillText('1UP', it.x+it.w/2, it.y+it.h*0.82); ctx.textAlign='left';
    } else if (it.type === 'flower') {
      /* ファイアフラワー */
      var fc = it.x+it.w/2, fbase = it.y+it.h;
      ctx.fillStyle = '#228B22'; ctx.fillRect(fc-2, it.y+it.h*0.5, 4, it.h*0.5);
      ctx.fillStyle = '#00AA00'; ctx.fillRect(fc-10, it.y+it.h*0.6, 10, 5);
      var frot = Date.now()/300;
      var petalC = ['#FF4500','#FF6600','#FF4500','#FF8C00','#FF4500'];
      for (var fp=0; fp<5; fp++) {
        var fa = fp*Math.PI*2/5 + frot;
        ctx.fillStyle = petalC[fp];
        ctx.beginPath(); ctx.arc(fc+Math.cos(fa)*9, it.y+it.h*0.32+Math.sin(fa)*9, 7, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#FFFF00'; ctx.beginPath(); ctx.arc(fc, it.y+it.h*0.32, 6, 0, Math.PI*2); ctx.fill();
    }
  }
  for (var i = 0; i < ld.enemies.length; i++) {
    var e = ld.enemies[i];
    if (!e.alive) continue;
    if (e.x+e.w < camX-4 || e.x > camX+W+4) continue;
    var eh = e.stomp ? 9 : e.h, eyo = e.y + (e.h - eh);
    if (e.type === 'thrower') {
      /* 投擲敵: 紫色・角あり */
      ctx.fillStyle = '#6600CC'; ctx.fillRect(e.x, eyo, e.w, eh);
      if (!e.stomp) {
        ctx.fillStyle = '#AA44FF';
        ctx.fillRect(e.x+3, eyo-6, 6, 7); ctx.fillRect(e.x+e.w-9, eyo-6, 6, 7); /* 角 */
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(e.x+3, eyo+4, 6, 6); ctx.fillRect(e.x+e.w-9, eyo+4, 6, 6); /* 目 */
        ctx.fillStyle = '#FFFF00';
        ctx.fillRect(e.x+4, eyo+5, 4, 4); ctx.fillRect(e.x+e.w-8, eyo+5, 4, 4); /* 瞳 */
        ctx.fillStyle = '#550099';
        ctx.fillRect(e.x, eyo+eh-7, 10, 7); ctx.fillRect(e.x+e.w-10, eyo+eh-7, 10, 7); /* 足 */
        /* 腕(投擲モーション) */
        var armX = e.vx < 0 ? e.x : e.x+e.w-12;
        ctx.fillStyle = '#8800EE';
        ctx.save();
        ctx.translate(armX+6, eyo+eh*0.5);
        ctx.rotate(Math.sin(Date.now()/200)*0.5);
        ctx.fillRect(-6,-3,12,6); ctx.restore();
      }
    } else {
      ctx.fillStyle='#7B3800'; ctx.fillRect(e.x,eyo,e.w,eh);
      if (!e.stomp) {
        ctx.fillStyle='#FF2200'; ctx.fillRect(e.x+3,eyo+3,5,5); ctx.fillRect(e.x+e.w-8,eyo+3,5,5);
        ctx.fillStyle='#000'; ctx.fillRect(e.x+4,eyo+4,3,3); ctx.fillRect(e.x+e.w-7,eyo+4,3,3);
        ctx.fillStyle='#4A1A00'; ctx.fillRect(e.x,eyo+eh-7,9,7); ctx.fillRect(e.x+e.w-9,eyo+eh-7,9,7);
      }
    }
  }
  /* flag */
  var fx = ld.flagX;
  if (fx-camX > -10 && fx-camX < W+10) {
    ctx.fillStyle='#888'; ctx.fillRect(fx, H-TW*8, 5, TW*6.5);
    var ft = Date.now()/180;
    ctx.fillStyle='#EE2222'; ctx.beginPath();
    ctx.moveTo(fx+5, H-TW*8);
    ctx.lineTo(fx+5+Math.sin(ft)*5+40, H-TW*8+18);
    ctx.lineTo(fx+5+Math.sin(ft+0.5)*3, H-TW*8+36);
    ctx.fill();
    ctx.fillStyle='#FFD700'; ctx.font='16px sans-serif';
    ctx.fillText('\u2B50', fx+8, H-TW*8+28);
    ctx.fillStyle='#666'; ctx.fillRect(fx-6, H-TW*2, 16, 8);
  }

  /* player */
  drawPlayer();

  /* particles */
  for (var i = 0; i < parts.length; i++) {
    var pt = parts[i];
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.col;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  /* popups */
  for (var i = 0; i < popups.length; i++) {
    var pop = popups[i];
    ctx.globalAlpha = pop.life;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pop.txt, pop.x, pop.y);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;

  /* 弾 (ワールド座標で描画) */
  for (var i = 0; i < ld.projectiles.length; i++) {
    var pb = ld.projectiles[i];
    if (!pb.active) continue;
    if (pb.x < camX - 20 || pb.x > camX + W + 20) continue;
    var pt3 = Date.now() / 60;
    if (pb.owner === 'player') {
      /* 炎弾: オレンジ+黄色コア+グロー */
      ctx.fillStyle = 'rgba(255,180,0,0.35)';
      ctx.beginPath(); ctx.arc(pb.x + Math.cos(pt3)*2, pb.y + Math.sin(pt3)*2, pb.r + 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FF6600';
      ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r + 1, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFEE00';
      ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r - 2, 0, Math.PI*2); ctx.fill();
    } else {
      /* 敵弾: 紫の石つぶて */
      ctx.fillStyle = '#9900FF';
      ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#CC66FF';
      ctx.beginPath(); ctx.arc(pb.x - 2, pb.y - 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(170,0,255,0.25)';
      ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r + 4, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore(); /* back to screen space */

  /* flower indicator */
  if (P.hasFlower) {
    ctx.fillStyle = 'rgba(255,80,0,0.85)';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('\uD83D\uDD25 FIRE (Z)', W - 8, H - 26);
    ctx.textAlign = 'left';
  }

  /* progress bar */
  var prog = Math.min(1, P.x / Math.max(1, ld.flagX - 80));
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(W/2-100, 8, 200, 11);
  ctx.fillStyle='#FFD700';          ctx.fillRect(W/2-100, 8, 200*prog, 11);
  ctx.strokeStyle='#aa8800'; ctx.lineWidth=1; ctx.strokeRect(W/2-100, 8, 200, 11);
  ctx.fillStyle='#E8341C'; ctx.fillRect(W/2-100+200*prog-3, 5, 6, 17);
  ctx.fillStyle='#EE2222'; ctx.fillRect(W/2+103, 4, 9, 18);

  /* overlay screens */
  if (gs === 'start') drawScreen('#FFD700', 'MOUSTACHE',
    '\u2190 \u2192 \u79FB\u52D5  \u30B9\u30DA\u30FC\u30B9/\u2191 \u30B8\u30E3\u30F3\u30D7  Shift \u30C0\u30C3\u30B7\u30E5',
    '?\u30D6\u30ED\u30C3\u30AF\u3092\u53F3\u304B\u3089\u53E9\u304F\uFF01\u6575\u3092\u8E0F\u3093\u3067\u5012\u305B\uFF01',
    '\u30B9\u30DA\u30FC\u30B9 / \u30BF\u30C3\u30D7 \u3067\u30B9\u30BF\u30FC\u30C8');
  if (gs === 'dead') drawScreen('#FF4444', 'MISS!',
    '\u6B8B\u308A ' + lives + ' \u6A5F', '', '\u30B9\u30DA\u30FC\u30B9 / \u30BF\u30C3\u30D7 \u3067\u3064\u3065\u3051\u308B');
  if (gs === 'over') drawScreen('#FF2222', 'GAME OVER',
    '\u30B9\u30B3\u30A2: ' + score, '', '\u30B9\u30DA\u30FC\u30B9 / \u30BF\u30C3\u30D7 \u3067\u30EA\u30B9\u30BF\u30FC\u30C8');
  if (gs === 'win') drawScreen('#FFD700', 'LEVEL ' + (level-1) + ' CLEAR!',
    '\u30B9\u30B3\u30A2: ' + score + '  \u30B3\u30A4\u30F3: ' + coins, '', '\u6B21\u306E\u30EC\u30D9\u30EB\u3078 \u2192');
}

function drawPlayer() {
  var p = P;

  /* star: don't blink, but invincibility blink still applies when not star */
  if (p.star <= 0 && p.inv > 0 && Math.floor(p.inv/4) % 2 === 0) return;

  if (p.dead) {
    ctx.save();
    ctx.translate(p.x + PW/2, p.y + PH/2);
    ctx.rotate(p.dt * 0.18);
    ctx.fillStyle = '#DD2211';
    ctx.fillRect(-PW/2, -PH/2, PW, PH);
    ctx.restore();
    return;
  }

  /* star rainbow overlay color */
  var starColors = ['#FF4444','#FF9900','#FFFF00','#44FF44','#44AAFF','#CC44FF'];
  var hatCol = p.star > 0 ? starColors[p.starColor % 6] : '#DD2211';
  var bodyCol = p.star > 0 ? starColors[(p.starColor + 2) % 6] : '#1A5CCC';

  /* big player is taller */
  var ph = p.big ? PH * 1.55 : PH;
  var pw = p.big ? PW + 4 : PW;
  /* draw at adjusted y so feet stay on ground */
  var px = p.x - (p.big ? 2 : 0);
  var py = p.y - (ph - PH);

  ctx.save();
  if (p.dir === -1) {
    ctx.translate(px + pw/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(px + pw/2), 0);
  }

  /* hat */
  ctx.fillStyle = hatCol;
  ctx.fillRect(px, py, pw, ph*0.32|0);
  ctx.fillRect(px-4, py+(ph*0.30|0), pw+8, 7);

  /* face */
  ctx.fillStyle = '#FFD5A0';
  ctx.fillRect(px, py+(ph*0.26|0), pw, ph*0.40|0);

  /* eye */
  ctx.fillStyle = '#000';
  ctx.fillRect(px+pw-10, py+(ph*0.32|0), 5, 4);

  /* mustache */
  ctx.fillStyle = '#4A2000';
  ctx.fillRect(px+pw-16, py+(ph*0.50|0), 14, 4);

  /* overalls */
  ctx.fillStyle = bodyCol;
  ctx.fillRect(px+2, py+(ph*0.63|0), pw-4, ph*0.37|0);

  /* buckles */
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(px+5,     py+(ph*0.64|0), 4, 4);
  ctx.fillRect(px+pw-9,  py+(ph*0.64|0), 4, 4);

  /* legs */
  var lo = (p.onG && Math.abs(p.vx) > 0.5) ? [[-3,3],[0,0],[3,-3]][p.wf] : [0,0];
  ctx.fillStyle = p.star > 0 ? starColors[(p.starColor+4)%6] : '#0A2E99';
  ctx.fillRect(px+2+lo[0],      py+ph-10, pw/2-3, 11);
  ctx.fillRect(px+pw/2+1+lo[1], py+ph-10, pw/2-3, 11);

  /* shoes */
  ctx.fillStyle = '#4A2000';
  ctx.fillRect(px-1+lo[0],      py+ph-4, pw/2+2, 6);
  ctx.fillRect(px+pw/2-1+lo[1], py+ph-4, pw/2+3, 6);

  /* star sparkle effect */
  if (p.star > 0) {
    var t = Date.now()/100;
    for (var si = 0; si < 4; si++) {
      var sa = t + si * Math.PI/2;
      var sx2 = px + pw/2 + Math.cos(sa) * (pw*0.7);
      var sy2 = py + ph/2 + Math.sin(sa) * (ph*0.5);
      ctx.fillStyle = starColors[(p.starColor + si) % 6];
      ctx.beginPath(); ctx.arc(sx2, sy2, 4, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

function drawScreen(col, title, line1, line2, blinkTxt) {
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=col; ctx.font='bold 40px monospace'; ctx.fillText(title, W/2, H/2-50);
  ctx.fillStyle='#fff'; ctx.font='16px monospace';
  if (line1) ctx.fillText(line1, W/2, H/2+5);
  ctx.fillStyle='#ccc'; ctx.font='14px monospace';
  if (line2) ctx.fillText(line2, W/2, H/2+28);
  if (Math.floor(Date.now()/550) % 2 === 0) {
    ctx.fillStyle=col; ctx.font='bold 15px monospace';
    ctx.fillText('[ ' + blinkTxt + ' ]', W/2, H/2+62);
  }
  ctx.textAlign='left';
}

/* ---- MAIN LOOP ---- */
ld = buildLevel(level);
resetPlayer();

function loop() {
  requestAnimationFrame(loop);
  update();
  draw();
}
loop();
</script>
