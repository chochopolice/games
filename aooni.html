
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#gc{display:flex;flex-direction:column;align-items:center;padding:.8rem 0;font-family:var(--font-mono,monospace);}
#canvas{border:2px solid #333;display:block;image-rendering:pixelated;}
#ui{color:#aaa;font-size:12px;margin-top:6px;text-align:center;line-height:1.9;}
#cw{position:relative;display:inline-block;}
#ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10;min-width:240px;}
#legend{display:flex;gap:14px;margin-top:6px;justify-content:center;align-items:center;font-size:11px;color:#888;}
.li{display:flex;align-items:center;gap:4px;}
.ls{width:10px;height:10px;border-radius:2px;display:inline-block;}
</style>
<div id="gc">
  <div id="cw">
    <canvas id="canvas" width="480" height="480"></canvas>
    <div id="ov"></div>
  </div>
  <div id="ui">
    <span>WASD / 矢印キー で移動</span>&nbsp;|&nbsp;
    <span id="ic">扉: 0/3 開</span>&nbsp;|&nbsp;
    <span id="st">鍵を集めて扉を開けろ！</span>
  </div>
  <div id="legend">
    <div class="li"><span class="ls" style="background:#e8a020"></span>鍵①→</div>
    <div class="li"><span class="ls" style="background:#c060c0"></span>扉①</div>
    <div class="li"><span class="ls" style="background:#40d0a0"></span>鍵②→</div>
    <div class="li"><span class="ls" style="background:#207088"></span>扉②</div>
    <div class="li"><span class="ls" style="background:#d05050"></span>鍵③→</div>
    <div class="li"><span class="ls" style="background:#906820"></span>扉③</div>
  </div>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const ov=document.getElementById('ov');
const icEl=document.getElementById('ic');
const stEl=document.getElementById('st');
const T=32,C=15,R=15;

const DI=[
  {keyFill:'#e8a020',keyShadow:'#a06010',doorFill:'#7a3a8a',doorStroke:'#c060c0',openFill:'#1a0a2a',openGlow:'rgba(180,80,220,0.18)'},
  {keyFill:'#40d0a0',keyShadow:'#208060',doorFill:'#1a5868',doorStroke:'#40aac8',openFill:'#081820',openGlow:'rgba(60,180,160,0.18)'},
  {keyFill:'#e06060',keyShadow:'#903030',doorFill:'#6a4a10',doorStroke:'#c09030',openFill:'#1a1008',openGlow:'rgba(200,140,40,0.18)'},
];

// ---- Maze ----
function generateMaze(){
  const g=Array.from({length:R},()=>new Array(C).fill(0));
  function carve(r,c){
    g[r][c]=1;
    const d=[[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-.5);
    for(const[dr,dc]of d){const nr=r+dr,nc=c+dc;if(nr>0&&nr<R-1&&nc>0&&nc<C-1&&g[nr][nc]===0){g[r+dr/2][c+dc/2]=1;carve(nr,nc);}}
  }
  carve(1,1);
  // 2パス・25%でループ追加（チョークポイントを残す）
  for(let p=0;p<2;p++)
    for(let r=1;r<R-1;r++)for(let c=1;c<C-1;c++)
      if(g[r][c]===0&&Math.random()<0.25){
        const adj=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>g[nr][nc]===1).length;
        if(adj>=2)g[r][c]=1;
      }
  return g;
}

// ---- Walkability ----
let map,doors;
function walkable(r,c){
  if(r<0||r>=R||c<0||c>=C||map[r][c]===0)return false;
  const d=doors&&doors.find(d=>d.r===r&&d.c===c);
  return !(d&&!d.open);
}

// ---- BFS util ----
const D4=[[0,1],[0,-1],[1,0],[-1,0]];
function bfsReach(sr,sc){
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const q=[[sr,sc]],cells=[];
  vis[sr][sc]=true;
  while(q.length){const[r,c]=q.shift();cells.push([r,c]);
    for(const[dr,dc]of D4){const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=R||nc<0||nc>=C||vis[nr][nc]||!walkable(nr,nc))continue;
      vis[nr][nc]=true;q.push([nr,nc]);}}
  return cells;
}
function bfsPath(fr,fc,tr,tc){
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const par=Array.from({length:R},()=>new Array(C).fill(null));
  const q=[[fr,fc]];vis[fr][fc]=true;
  while(q.length){const[r,c]=q.shift();
    if(r===tr&&c===tc){let p=[[r,c]],cu=[r,c];while(par[cu[0]][cu[1]]){cu=par[cu[0]][cu[1]];p.unshift(cu);}return p;}
    for(const[dr,dc]of D4){const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=R||nc<0||nc>=C||vis[nr][nc]||!walkable(nr,nc))continue;
      vis[nr][nc]=true;par[nr][nc]=[r,c];q.push([nr,nc]);}}
  return[];
}

// ---- Distance ----
function md(ar,ac,br,bc){return Math.abs(ar-br)+Math.abs(ac-bc);}

// ---- Find door candidates (chokepoints) ----
function findDoorCandidates(){
  const floors=[];
  for(let r=1;r<R-1;r++)for(let c=1;c<C-1;c++)if(map[r][c]===1)floors.push([r,c]);
  const base=floors.length;
  const cands=[];
  for(const[r,c]of floors){
    if(md(r,c,1,1)<5)continue;
    map[r][c]=0;
    const reach=bfsReach(1,1).filter(([pr,pc])=>map[pr][pc]===1).length;
    map[r][c]=1;
    const iso=base-1-reach;
    if(iso>=2)cands.push({r,c,iso});
  }
  cands.sort((a,b)=>b.iso-a.iso);
  return cands;
}

// ---- Init ----
let player,oni,keyItems,collectedKeys;
let moveTimer,oniMoveTimer,shakeTimer,gameResult,graceTimer,state,pKeys;
let oniMode,oniPDir,alertFlash;

function initGame(){
  pKeys=new Set();
  map=generateMaze();
  doors=[];

  // Find 3 well-distributed chokepoints
  const cands=findDoorCandidates();
  for(const ch of cands){
    if(doors.every(d=>md(d.r,d.c,ch.r,ch.c)>5)){
      doors.push({r:ch.r,c:ch.c,open:false,idx:doors.length});
      if(doors.length===3)break;
    }
  }
  // Fallback: any corridor tile
  if(doors.length<3){
    for(let r=2;r<R-2&&doors.length<3;r++)
      for(let c=2;c<C-2&&doors.length<3;c++){
        if(map[r][c]!==1||md(r,c,1,1)<5)continue;
        if(doors.every(d=>md(d.r,d.c,r,c)>5))
          doors.push({r,c,open:false,idx:doors.length});
      }
  }

  // Accessible from start with all doors closed
  const acc=bfsReach(1,1).filter(([r,c])=>map[r][c]===1&&!doors.some(d=>d.r===r&&d.c===c));

  player={r:1,c:1,x:T,y:T};

  // Oni = farthest accessible cell
  const oc=acc.reduce((b,e)=>md(e[0],e[1],1,1)>md(b[0],b[1],1,1)?e:b,acc[0]);
  oni={r:oc[0],c:oc[1],x:oc[1]*T,y:oc[0]*T};

  // 3 keys spread in accessible area
  const pool=acc.filter(([r,c])=>md(r,c,1,1)>3&&!(r===oc[0]&&c===oc[1])).sort(()=>Math.random()-.5);
  const kp=[];
  for(const cell of pool){
    if(kp.every(k=>md(k[0],k[1],cell[0],cell[1])>4)){kp.push(cell);if(kp.length===3)break;}
  }
  while(kp.length<3&&pool.length>kp.length)kp.push(pool[kp.length]);
  keyItems=kp.map(([r,c],i)=>({r,c,collected:false,idx:i}));

  collectedKeys=0;moveTimer=0;oniMoveTimer=0;
  shakeTimer=0;gameResult='';graceTimer=3.5;state='playing';
  oniMode='patrol';oniPDir=null;alertFlash=0;
  ov.innerHTML='';
  icEl.textContent='扉: 0/3 開';
  stEl.textContent='鍵を集めて扉を開けろ！';
}

// ---- Oni patrol ----
function oniPatrolStep(){
  const sh=[...D4].sort(()=>Math.random()-.5);
  if(oniPDir)sh.sort((a,b)=>(a[0]===oniPDir[0]&&a[1]===oniPDir[1]?-1:b[0]===oniPDir[0]&&b[1]===oniPDir[1]?1:0));
  for(const[dr,dc]of sh){
    const nr=oni.r+dr,nc=oni.c+dc;
    if(!walkable(nr,nc))continue;
    oniPDir=[dr,dc];oni.r=nr;oni.c=nc;oni.x=nc*T;oni.y=nr*T;return;
  }
  oniPDir=null;
}

// ---- LOS ----
const LOS=9;
function hasLOS(ar,ac,br,bc){
  const dx=bc-ac,dy=br-ar,d=Math.sqrt(dx*dx+dy*dy);
  if(d>LOS)return false;
  const s=Math.ceil(d*2);
  for(let i=1;i<s;i++){
    const tr=ar+dy*(i/s),tc=ac+dx*(i/s);
    const gr=Math.round(tr),gc=Math.round(tc);
    if(gr===br&&gc===bc)break;
    if(!walkable(gr,gc))return false;
  }
  return true;
}

// ---- Drawing ----
function drawTile(r,c){
  const x=c*T,y=r*T;
  const door=doors.find(d=>d.r===r&&d.c===c);
  if(map[r][c]===0){
    ctx.fillStyle='#0d0d1a';ctx.fillRect(x,y,T,T);
    ctx.fillStyle='#1a1a2e';ctx.fillRect(x+1,y+1,T-2,T-2);
    if(r%2===0&&c%3===0){ctx.fillStyle='rgba(255,255,255,0.015)';ctx.fillRect(x+2,y+2,T-4,5);}
  } else {
    ctx.fillStyle='#16213e';ctx.fillRect(x,y,T,T);
    if((r+c)%2===0){ctx.fillStyle='rgba(255,255,255,0.012)';ctx.fillRect(x,y,T,T);}
    if(door){
      const di=DI[door.idx];
      if(!door.open){
        // 扉（閉）
        ctx.fillStyle=di.doorFill;ctx.fillRect(x+2,y+2,T-4,T-4);
        ctx.strokeStyle=di.doorStroke;ctx.lineWidth=2;ctx.strokeRect(x+3,y+3,T-6,T-6);
        // 鍵穴
        ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.arc(x+T/2,y+T/2-2,4,0,Math.PI*2);ctx.fill();
        ctx.fillRect(x+T/2-2,y+T/2+2,4,5);
        // 対応する色のアクセント
        ctx.fillStyle=di.doorStroke;ctx.fillRect(x+2,y+2,T-4,3);
      } else {
        // 扉（開）- 開いた演出
        ctx.fillStyle=di.openFill;ctx.fillRect(x,y,T,T);
        ctx.fillStyle=di.openGlow;ctx.fillRect(x,y,T,T);
        // 開いた扉の枠線
        ctx.strokeStyle=di.doorStroke+'88';ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.strokeRect(x+1,y+1,T-2,T-2);ctx.setLineDash([]);
      }
    }
  }
}

function drawPlayer(){
  const x=player.x+T/2,y=player.y+T/2;
  ctx.fillStyle='#b08850';ctx.fillRect(x-7,y-10,14,18);
  ctx.fillStyle='#e8c97e';ctx.beginPath();ctx.arc(x,y-13,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.fillRect(x-4,y-14,3,3);ctx.fillRect(x+1,y-14,3,3);
  ctx.fillStyle='#664';ctx.fillRect(x-3,y-10,6,1);
}

function drawOni(gl){
  const x=oni.x+T/2,y=oni.y+T/2;
  const bob=Math.sin(Date.now()/200)*2;
  if(oniMode==='chase'){
    const p=0.15+0.1*Math.sin(Date.now()/100);
    ctx.fillStyle=`rgba(255,50,50,${p})`;ctx.beginPath();ctx.arc(x,y+bob,18,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=gl>0?0.4+0.25*Math.sin(Date.now()/300):1;
  ctx.fillStyle='#1a2e88';ctx.beginPath();ctx.ellipse(x,y+bob+2,11,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=oniMode==='chase'?'#66aaff':'#4488ff';
  ctx.beginPath();ctx.ellipse(x,y+bob,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(x-5,y+bob-5,4,4);ctx.fillRect(x+1,y+bob-5,4,4);
  ctx.fillStyle=oniMode==='chase'?'#ff2222':'rgba(0,0,0,0.9)';
  ctx.fillRect(x-4,y+bob-4,2,2);ctx.fillRect(x+2,y+bob-4,2,2);
  ctx.fillStyle='#2233aa';
  ctx.beginPath();ctx.moveTo(x-6,y+bob-9);ctx.lineTo(x-9,y+bob-17);ctx.lineTo(x-2,y+bob-10);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+6,y+bob-9);ctx.lineTo(x+9,y+bob-17);ctx.lineTo(x+2,y+bob-10);ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;
  if(gl>0){
    ctx.fillStyle='rgba(120,160,255,0.85)';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText(Math.ceil(gl)+'秒後に動く',x,y+bob-22);
  }
  if(oniMode==='chase'&&alertFlash>0.3){
    ctx.fillStyle=`rgba(255,80,0,${alertFlash})`;ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('！！！',x,y+bob-26);
  }
}

function drawKeys(){
  keyItems.forEach(k=>{
    if(k.collected)return;
    const di=DI[k.idx];
    const x=k.c*T+T/2,y=k.r*T+T/2;
    const bob=Math.sin(Date.now()/420+k.c*1.3)*3;
    // グロー
    ctx.fillStyle=di.keyFill+'30';ctx.beginPath();ctx.arc(x,y+bob,13,0,Math.PI*2);ctx.fill();
    // 鍵の輪
    ctx.strokeStyle=di.keyShadow;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y+bob-5,5,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=di.keyFill;ctx.beginPath();ctx.arc(x,y+bob-5,4,0,Math.PI*2);ctx.fill();
    // 鍵の柄
    ctx.fillStyle=di.keyFill;ctx.fillRect(x-1,y+bob,2,7);
    ctx.fillRect(x+1,y+bob+2,3,2);ctx.fillRect(x+1,y+bob+5,3,2);
    // 番号
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText(k.idx+1,x,y+bob-3);
  });
}

function drawFog(){
  const px=player.x+T/2,py=player.y+T/2;
  const g=ctx.createRadialGradient(px,py,55,px,py,230);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.5,'rgba(0,0,5,0.2)');g.addColorStop(1,'rgba(0,0,5,0.94)');
  ctx.fillStyle=g;ctx.fillRect(0,0,480,480);
}

function showResult(){
  if(gameResult==='win'){
    ov.innerHTML=`<div style="background:rgba(0,20,0,0.93);border:1px solid #3a6;padding:22px 32px;border-radius:8px;color:#7fa">
      <div style="font-size:22px;font-weight:bold;margin-bottom:8px;">🎉 脱出成功！</div>
      <div style="font-size:13px;color:#5a8;margin-bottom:14px;">3つの扉を開けて洋館から逃げ出した！</div>
      <button onclick="window.resetGame()" style="background:#1a4a2a;color:#7fa;border:1px solid #3a6;padding:8px 20px;cursor:pointer;font-family:monospace;font-size:13px;border-radius:4px;">もう一度（新しい迷路）</button>
    </div>`;
  } else {
    ov.innerHTML=`<div style="background:rgba(20,0,0,0.93);border:1px solid #a33;padding:22px 32px;border-radius:8px;color:#f88">
      <div style="font-size:22px;font-weight:bold;margin-bottom:8px;">💀 捕まった...</div>
      <div style="font-size:13px;color:#a66;margin-bottom:14px;">扉: ${collectedKeys}/3</div>
      <button onclick="window.resetGame()" style="background:#3a0a0a;color:#f88;border:1px solid #a33;padding:8px 20px;cursor:pointer;font-family:monospace;font-size:13px;border-radius:4px;">もう一度</button>
    </div>`;
  }
}

// ---- Game loop ----
let last=null;
function loop(ts){
  if(!last)last=ts;
  const dt=Math.min((ts-last)/1000,0.1);last=ts;

  if(state==='playing'){
    // Grace
    if(graceTimer>0){
      graceTimer=Math.max(0,graceTimer-dt);
      stEl.textContent=graceTimer>0?`青鬼が動き出すまで ${Math.ceil(graceTimer)} 秒！急げ！`:'鍵を集めて扉を開けろ！';
    }
    // Player
    let dx=0,dy=0;
    if(pKeys.has('ArrowLeft')||pKeys.has('a')||pKeys.has('A'))dx=-1;
    if(pKeys.has('ArrowRight')||pKeys.has('d')||pKeys.has('D'))dx=1;
    if(pKeys.has('ArrowUp')||pKeys.has('w')||pKeys.has('W'))dy=-1;
    if(pKeys.has('ArrowDown')||pKeys.has('s')||pKeys.has('S'))dy=1;
    moveTimer+=dt;
    if(moveTimer>=0.1&&(dx||dy)){
      moveTimer=0;
      const nr=player.r+dy,nc=player.c+dx;
      if(walkable(nr,nc)){player.r=nr;player.c=nc;player.x=nc*T;player.y=nr*T;}
    }
    // Key pickup → open corresponding door
    keyItems.forEach(k=>{
      if(!k.collected&&k.r===player.r&&k.c===player.c){
        k.collected=true;collectedKeys++;
        // 対応する扉を開ける
        if(doors[k.idx])doors[k.idx].open=true;
        icEl.textContent=`扉: ${collectedKeys}/3 開`;
        const di=DI[k.idx];
        if(collectedKeys>=3){stEl.textContent='🏆 全ての扉が開いた！脱出成功！';state='win';gameResult='win';showResult();}
        else stEl.textContent=`🗝 扉${k.idx+1}が開いた！(${collectedKeys}/3)`;
      }
    });
    if(state!=='playing'){requestAnimationFrame(loop);return;}

    // Oni AI
    if(graceTimer<=0){
      const see=hasLOS(oni.r,oni.c,player.r,player.c);
      if(see){if(oniMode==='patrol')alertFlash=1.0;oniMode='chase';}
      else if(oniMode==='chase'&&md(oni.r,oni.c,player.r,player.c)>4)oniMode='patrol';
      if(alertFlash>0)alertFlash=Math.max(0,alertFlash-dt*1.5);

      oniMoveTimer+=dt;
      const delay=oniMode==='chase'?Math.max(0.28,0.33-collectedKeys*0.02):0.72;
      if(oniMoveTimer>=delay){
        oniMoveTimer=0;
        if(oniMode==='chase'){const p=bfsPath(oni.r,oni.c,player.r,player.c);if(p.length>1){oni.r=p[1][0];oni.c=p[1][1];oni.x=oni.c*T;oni.y=oni.r*T;}}
        else oniPatrolStep();
        if(oniMode==='chase'&&collectedKeys>0)stEl.textContent='👁 見つかった！扉で逃げろ！';
        else if(oniMode==='chase')stEl.textContent='👁 見つかった！逃げろ！';
      }
    }
    // Caught
    if(oni.r===player.r&&oni.c===player.c){state='dead';gameResult='dead';shakeTimer=0.6;showResult();}
    if(shakeTimer>0)shakeTimer-=dt;
  }

  // Draw
  ctx.fillStyle='#000';ctx.fillRect(0,0,480,480);
  const sx=state==='dead'&&shakeTimer>0?(Math.random()-.5)*10:0;
  const sy=state==='dead'&&shakeTimer>0?(Math.random()-.5)*10:0;
  ctx.save();ctx.translate(sx,sy);
  for(let r=0;r<R;r++)for(let c=0;c<C;c++)drawTile(r,c);
  drawKeys();drawPlayer();drawOni(graceTimer);drawFog();
  // alert flash overlay
  if(alertFlash>0){ctx.fillStyle=`rgba(255,60,0,${alertFlash*0.15})`;ctx.fillRect(0,0,480,480);}
  ctx.restore();
  if(state==='dead'&&shakeTimer<=0){ctx.fillStyle='rgba(80,0,0,0.5)';ctx.fillRect(0,0,480,480);}
  requestAnimationFrame(loop);
}

initGame();

document.addEventListener('keydown',e=>{pKeys.add(e.key);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>pKeys.delete(e.key));

// Dパッド
const dp=document.createElement('div');
dp.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:8px;';
dp.innerHTML=`<button id="up" style="width:48px;height:48px;background:#1a1a2e;color:#8af;border:1px solid #334;border-radius:8px;font-size:20px;cursor:pointer;touch-action:none;">▲</button>
<div style="display:flex;gap:4px;">
<button id="left" style="width:48px;height:48px;background:#1a1a2e;color:#8af;border:1px solid #334;border-radius:8px;font-size:20px;cursor:pointer;touch-action:none;">◀</button>
<button id="down" style="width:48px;height:48px;background:#1a1a2e;color:#8af;border:1px solid #334;border-radius:8px;font-size:20px;cursor:pointer;touch-action:none;">▼</button>
<button id="right" style="width:48px;height:48px;background:#1a1a2e;color:#8af;border:1px solid #334;border-radius:8px;font-size:20px;cursor:pointer;touch-action:none;">▶</button>
</div>`;
document.getElementById('gc').appendChild(dp);
[['up','ArrowUp'],['down','ArrowDown'],['left','ArrowLeft'],['right','ArrowRight']].forEach(([id,key])=>{
  const b=document.getElementById(id);
  b.addEventListener('mousedown',()=>pKeys.add(key));b.addEventListener('mouseup',()=>pKeys.delete(key));b.addEventListener('mouseleave',()=>pKeys.delete(key));
  b.addEventListener('touchstart',e=>{e.preventDefault();pKeys.add(key);});b.addEventListener('touchend',e=>{e.preventDefault();pKeys.delete(key);});
});
window.resetGame=()=>{initGame();last=null;};
requestAnimationFrame(loop);
</script>
