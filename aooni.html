<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>青鬼 - 壁突破ゲーム</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;}
#canvas{border:2px solid #333;display:block;image-rendering:pixelated;}
#ui{color:#aaa;font-size:12px;margin-top:8px;text-align:center;line-height:1.9;}
#cw{position:relative;display:inline-block;}
#ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;min-width:240px;}
#dpad{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:10px;}
.drow{display:flex;gap:4px;}
.dbtn{width:52px;height:52px;background:#1a1a2e;color:#8af;border:1px solid #334;border-radius:8px;font-size:22px;cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;}
</style>
</head>
<body>
<div id="cw">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="ov"></div>
</div>
<div id="ui">
  <span>WASD / 矢印キー</span>&nbsp;|&nbsp;
  <span id="ic">🗝 所持: 0 &nbsp;💥 突破: 0/3</span>&nbsp;|&nbsp;
  <span id="st">鍵を拾って ひびの壁を突破しろ！</span>
</div>
<div id="dpad">
  <div class="drow"><button class="dbtn" id="up">▲</button></div>
  <div class="drow">
    <button class="dbtn" id="left">◀</button>
    <button class="dbtn" id="down">▼</button>
    <button class="dbtn" id="right">▶</button>
  </div>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const ov=document.getElementById('ov');
const icEl=document.getElementById('ic');
const stEl=document.getElementById('st');
const T=32,C=15,R=15;
// Tile: 0=wall 1=floor 2=breakable_wall
let map,keyItems,breakWalls,player,oni;
let pKeys,state,mT,oT,sT,gT;
let heldKeys,brokenCount;
let oMode,oPDir,aFlash,gRes,bFx;

function generateMaze(){
  const g=Array.from({length:R},()=>new Array(C).fill(0));
  function carve(r,c){
    g[r][c]=1;
    const dirs=[[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-.5);
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>=1&&nr<=R-2&&nc>=1&&nc<=C-2&&g[nr][nc]===0){g[r+dr/2][c+dc/2]=1;carve(nr,nc);}
    }
  }
  carve(1,1);
  for(let pass=0;pass<3;pass++)
    for(let r=1;r<R-1;r++)for(let c=1;c<C-1;c++){
      if(g[r][c]===0&&Math.random()<0.28){
        const adj=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>nr>=0&&nr<R&&nc>=0&&nc<C&&g[nr][nc]===1).length;
        if(adj>=2)g[r][c]=1;
      }
    }
  return g;
}

function findBreakableSpots(){
  const spots=[];
  for(let r=2;r<R-2;r++)for(let c=2;c<C-2;c++){
    if(map[r][c]!==0)continue;
    const hOk=map[r][c-1]===1&&map[r][c+1]===1;
    const vOk=map[r-1][c]===1&&map[r+1][c]===1;
    if((hOk||vOk)&&Math.abs(r-1)+Math.abs(c-1)>=5)spots.push({r,c,sc:Math.random()});
  }
  spots.sort((a,b)=>b.sc-a.sc);
  const ch=[];
  for(const s of spots){
    if(ch.every(x=>Math.abs(x.r-s.r)+Math.abs(x.c-s.c)>=7)){ch.push(s);if(ch.length===3)break;}
  }
  return ch;
}

const D4=[[0,1],[0,-1],[1,0],[-1,0]];
function walkable(r,c){return r>=0&&r<R&&c>=0&&c<C&&map[r][c]===1;}
function bfsPath(fr,fc,tr,tc){
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const par=Array.from({length:R},()=>new Array(C).fill(null));
  const q=[[fr,fc]];vis[fr][fc]=true;
  while(q.length){
    const[r,c]=q.shift();
    if(r===tr&&c===tc){let p=[[r,c]],cu=[r,c];while(par[cu[0]][cu[1]]){cu=par[cu[0]][cu[1]];p.unshift(cu);}return p;}
    for(const[dr,dc]of D4){const nr=r+dr,nc=c+dc;if(nr<0||nr>=R||nc<0||nc>=C||vis[nr][nc]||!walkable(nr,nc))continue;vis[nr][nc]=true;par[nr][nc]=[r,c];q.push([nr,nc]);}
  }return[];
}
function bfsReach(sr,sc){
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const q=[[sr,sc]],cells=[];vis[sr][sc]=true;
  while(q.length){const[r,c]=q.shift();cells.push([r,c]);
    for(const[dr,dc]of D4){const nr=r+dr,nc=c+dc;if(nr<0||nr>=R||nc<0||nc>=C||vis[nr][nc]||!walkable(nr,nc))continue;vis[nr][nc]=true;q.push([nr,nc]);}}
  return cells;
}
function hasLOS(ar,ac,br,bc){
  const dx=bc-ac,dy=br-ar,d=Math.sqrt(dx*dx+dy*dy);
  if(d>7)return false;
  const s=Math.ceil(d*2);
  for(let i=1;i<s;i++){const gr=Math.round(ar+dy*(i/s)),gc=Math.round(ac+dx*(i/s));if(gr===br&&gc===bc)break;if(!walkable(gr,gc))return false;}
  return true;
}
function oniPatrol(){
  const sh=[...D4].sort(()=>Math.random()-.5);
  if(oPDir)sh.sort((a,b)=>a[0]===oPDir[0]&&a[1]===oPDir[1]?-1:b[0]===oPDir[0]&&b[1]===oPDir[1]?1:0);
  for(const[dr,dc]of sh){const nr=oni.r+dr,nc=oni.c+dc;if(!walkable(nr,nc))continue;oPDir=[dr,dc];oni.r=nr;oni.c=nc;oni.x=nc*T;oni.y=nr*T;return;}
  oPDir=null;
}
function updateUI(){icEl.textContent=`🗝 所持: ${heldKeys}  💥 突破: ${brokenCount}/3`;}

function initGame(){
  pKeys=new Set();map=generateMaze();
  const bwSpots=findBreakableSpots();
  bwSpots.forEach(s=>{map[s.r][s.c]=2;});
  breakWalls=bwSpots.map(s=>({r:s.r,c:s.c,broken:false}));
  player={r:1,c:1,x:T,y:T};
  const acc=bfsReach(1,1);
  const oc=acc.reduce((b,e)=>Math.abs(e[0]-1)+Math.abs(e[1]-1)>Math.abs(b[0]-1)+Math.abs(b[1]-1)?e:b,acc[0]);
  oni={r:oc[0],c:oc[1],x:oc[1]*T,y:oc[0]*T};
  const pool=acc.filter(([r,c])=>map[r][c]===1&&!(r===1&&c===1)&&!(r===oc[0]&&c===oc[1])).sort(()=>Math.random()-.5);
  keyItems=[];
  for(const cell of pool){
    if(keyItems.every(k=>Math.abs(k.r-cell[0])+Math.abs(k.c-cell[1])>=5)){keyItems.push({r:cell[0],c:cell[1],collected:false});if(keyItems.length===3)break;}
  }
  heldKeys=0;brokenCount=0;mT=0;oT=0;sT=0;gT=3.0;
  state='playing';oMode='patrol';oPDir=null;aFlash=0;gRes='';bFx=[];
  ov.innerHTML='';updateUI();stEl.textContent='🗝 鍵を拾って、ひびの壁に向かって進め！';
}

function breakWall(r,c){
  const bw=breakWalls.find(w=>w.r===r&&w.c===c&&!w.broken);
  if(!bw||heldKeys<=0)return;
  bw.broken=true;map[r][c]=1;heldKeys--;brokenCount++;
  bFx.push({r,c,t:1.0});updateUI();
  if(brokenCount>=3){state='win';gRes='win';showResult();}
  else stEl.textContent=`💥 壁を突破！(${brokenCount}/3) あと${3-brokenCount}か所！`;
}

function drawTile(r,c){
  const x=c*T,y=r*T,t=map[r][c];
  if(t===1){
    ctx.fillStyle='#16213e';ctx.fillRect(x,y,T,T);
    if((r+c)%2===0){ctx.fillStyle='rgba(255,255,255,0.012)';ctx.fillRect(x,y,T,T);}
  }else if(t===0){
    ctx.fillStyle='#0a0a14';ctx.fillRect(x,y,T,T);
    ctx.fillStyle='#141428';ctx.fillRect(x+1,y+1,T-2,T-2);
  }else if(t===2){
    ctx.fillStyle='#1a1030';ctx.fillRect(x,y,T,T);
    ctx.fillStyle='#251845';ctx.fillRect(x+1,y+1,T-2,T-2);
    // ひびの線
    ctx.strokeStyle='rgba(255,160,40,0.6)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(x+T/2,y+2);ctx.lineTo(x+T/2-4,y+T/2);ctx.lineTo(x+T/2+2,y+T-4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+T/2-4,y+T/2);ctx.lineTo(x+4,y+T*0.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+T/2+2,y+T/2-4);ctx.lineTo(x+T-6,y+T*0.35);ctx.stroke();
    const gp=0.15+0.1*Math.sin(Date.now()/380);
    ctx.fillStyle=`rgba(255,140,20,${gp})`;ctx.fillRect(x,y,T,T);
    if(heldKeys>0){ctx.fillStyle='rgba(255,220,80,0.85)';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.fillText('BREAK',x+T/2,y+T/2+3);}
  }
}
function drawBreakFx(){
  bFx=bFx.filter(e=>e.t>0);
  bFx.forEach(e=>{
    e.t-=0.025;const a=e.t,x=e.c*T,y=e.r*T,cx=x+T/2,cy=y+T/2;
    ctx.strokeStyle=`rgba(255,220,80,${a})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,(1-a)*T*2,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=`rgba(255,200,60,${a*0.6})`;ctx.fillRect(x,y,T,T);
    for(let i=0;i<8;i++){
      const ang=(i/8)*Math.PI*2,dist=(1-a)*T*2;
      ctx.fillStyle=`rgba(255,180,40,${a*0.8})`;
      ctx.fillRect(cx+Math.cos(ang)*dist-2,cy+Math.sin(ang)*dist-2,4,4);
    }
  });
}
function drawPlayer(){
  const x=player.x+T/2,y=player.y+T/2;
  ctx.fillStyle='#b08850';ctx.fillRect(x-7,y-10,14,18);
  ctx.fillStyle='#e8c97e';ctx.beginPath();ctx.arc(x,y-13,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.fillRect(x-4,y-14,3,3);ctx.fillRect(x+1,y-14,3,3);
  ctx.fillStyle='#664';ctx.fillRect(x-3,y-10,6,1);
  if(heldKeys>0){ctx.fillStyle='rgba(255,215,0,0.95)';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('🗝'+heldKeys,x,y-24);}
}
function drawOni(gl){
  const x=oni.x+T/2,y=oni.y+T/2,bob=Math.sin(Date.now()/200)*2;
  if(oMode==='chase'){const p=0.12+0.1*Math.sin(Date.now()/90);ctx.fillStyle=`rgba(255,40,40,${p})`;ctx.beginPath();ctx.arc(x,y+bob,22,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=gl>0?0.4+0.25*Math.sin(Date.now()/300):1;
  ctx.fillStyle='#1a2e88';ctx.beginPath();ctx.ellipse(x,y+bob+2,11,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=oMode==='chase'?'#66aaff':'#4488ff';ctx.beginPath();ctx.ellipse(x,y+bob,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(x-5,y+bob-5,4,4);ctx.fillRect(x+1,y+bob-5,4,4);
  ctx.fillStyle=oMode==='chase'?'#ff2222':'rgba(0,0,0,0.9)';ctx.fillRect(x-4,y+bob-4,2,2);ctx.fillRect(x+2,y+bob-4,2,2);
  ctx.fillStyle='#2233aa';
  ctx.beginPath();ctx.moveTo(x-6,y+bob-9);ctx.lineTo(x-9,y+bob-17);ctx.lineTo(x-2,y+bob-10);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+6,y+bob-9);ctx.lineTo(x+9,y+bob-17);ctx.lineTo(x+2,y+bob-10);ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;
  if(gl>0){ctx.fillStyle='rgba(120,160,255,0.85)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(Math.ceil(gl)+'秒後に動く',x,y+bob-22);}
  if(oMode==='chase'&&aFlash>0.4){ctx.fillStyle=`rgba(255,80,0,${aFlash})`;ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('！！！',x,y+bob-26);}
}
function drawKeys(){
  keyItems.forEach((k,i)=>{
    if(k.collected)return;
    const x=k.c*T+T/2,y=k.r*T+T/2,bob=Math.sin(Date.now()/420+i*1.5)*3;
    ctx.fillStyle='rgba(255,215,0,0.2)';ctx.beginPath();ctx.arc(x,y+bob,13,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a07000';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y+bob-4,5,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(x,y+bob-4,4,0,Math.PI*2);ctx.fill();
    ctx.fillRect(x-1,y+bob+1,2,8);ctx.fillRect(x+1,y+bob+3,3,2);ctx.fillRect(x+1,y+bob+6,3,2);
  });
}
function drawFog(){
  const px=player.x+T/2,py=player.y+T/2;
  const grd=ctx.createRadialGradient(px,py,55,px,py,230);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(0.5,'rgba(0,0,5,0.2)');grd.addColorStop(1,'rgba(0,0,5,0.96)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,480,480);
}
function showResult(){
  if(gRes==='win'){
    ov.innerHTML=`<div style="background:rgba(0,20,0,0.93);border:1px solid #3a6;padding:22px 32px;border-radius:8px;color:#7fa">
<div style="font-size:22px;font-weight:bold;margin-bottom:8px;">🎉 全壁突破！脱出成功！</div>
<div style="font-size:13px;color:#5a8;margin-bottom:14px;">3か所のひびの壁を打ち破った！</div>
<button onclick="initGame()" style="background:#1a4a2a;color:#7fa;border:1px solid #3a6;padding:8px 20px;cursor:pointer;font-family:monospace;font-size:13px;border-radius:4px;">もう一度（新迷路）</button>
</div>`;
  }else{
    ov.innerHTML=`<div style="background:rgba(20,0,0,0.93);border:1px solid #a33;padding:22px 32px;border-radius:8px;color:#f88">
<div style="font-size:22px;font-weight:bold;margin-bottom:8px;">💀 捕まった…</div>
<div style="font-size:13px;color:#a66;margin-bottom:14px;">💥 ${brokenCount}/3 突破</div>
<button onclick="initGame()" style="background:#3a0a0a;color:#f88;border:1px solid #a33;padding:8px 20px;cursor:pointer;font-family:monospace;font-size:13px;border-radius:4px;">もう一度</button>
</div>`;
  }
}

let last=null;
function loop(ts){
  if(!last)last=ts;const dt=Math.min((ts-last)/1000,0.1);last=ts;
  if(state==='playing'){
    if(gT>0){gT=Math.max(0,gT-dt);if(gT>0)stEl.textContent=`青鬼が動き出すまで ${Math.ceil(gT)} 秒！`;}
    let dx=0,dy=0;
    if(pKeys.has('ArrowLeft')||pKeys.has('a')||pKeys.has('A'))dx=-1;
    if(pKeys.has('ArrowRight')||pKeys.has('d')||pKeys.has('D'))dx=1;
    if(pKeys.has('ArrowUp')||pKeys.has('w')||pKeys.has('W'))dy=-1;
    if(pKeys.has('ArrowDown')||pKeys.has('s')||pKeys.has('S'))dy=1;
    mT+=dt;
    if(mT>=0.1&&(dx||dy)){
      mT=0;const nr=player.r+dy,nc=player.c+dx;
      if(nr>=0&&nr<R&&nc>=0&&nc<C){
        if(map[nr][nc]===1){player.r=nr;player.c=nc;player.x=nc*T;player.y=nr*T;}
        else if(map[nr][nc]===2&&heldKeys>0){
          breakWall(nr,nc);
          if(state==='win'){requestAnimationFrame(loop);return;}
          player.r=nr;player.c=nc;player.x=nc*T;player.y=nr*T;
        }
      }
    }
    keyItems.forEach(k=>{
      if(!k.collected&&k.r===player.r&&k.c===player.c){
        k.collected=true;heldKeys++;updateUI();
        stEl.textContent=`🗝 鍵を入手！(所持:${heldKeys})  ひびの壁に向かって進め！`;
      }
    });
    if(gT<=0){
      const see=hasLOS(oni.r,oni.c,player.r,player.c);
      if(see){if(oMode==='patrol')aFlash=1.0;oMode='chase';if(aFlash>0.9)stEl.textContent='👁 見つかった！逃げろ！';}
      else if(oMode==='chase'&&Math.abs(oni.r-player.r)+Math.abs(oni.c-player.c)>4)oMode='patrol';
      if(aFlash>0)aFlash=Math.max(0,aFlash-dt*1.5);
      oT+=dt;const delay=oMode==='chase'?Math.max(0.28,0.35-brokenCount*0.02):0.72;
      if(oT>=delay){oT=0;
        if(oMode==='chase'){const p=bfsPath(oni.r,oni.c,player.r,player.c);if(p.length>1){oni.r=p[1][0];oni.c=p[1][1];oni.x=oni.c*T;oni.y=oni.r*T;}}
        else oniPatrol();
      }
    }
    if(oni.r===player.r&&oni.c===player.c){state='dead';gRes='dead';sT=0.6;showResult();}
    if(sT>0)sT-=dt;
  }
  ctx.fillStyle='#000';ctx.fillRect(0,0,480,480);
  const sx=gRes==='dead'&&sT>0?(Math.random()-.5)*10:0,sy=gRes==='dead'&&sT>0?(Math.random()-.5)*10:0;
  ctx.save();ctx.translate(sx,sy);
  for(let r=0;r<R;r++)for(let c=0;c<C;c++)drawTile(r,c);
  drawKeys();drawBreakFx();drawPlayer();drawOni(gT);drawFog();
  if(aFlash>0){ctx.fillStyle=`rgba(255,60,0,${aFlash*0.13})`;ctx.fillRect(0,0,480,480);}
  ctx.restore();
  if(gRes==='dead'&&sT<=0){ctx.fillStyle='rgba(80,0,0,0.5)';ctx.fillRect(0,0,480,480);}
  requestAnimationFrame(loop);
}

initGame();
document.addEventListener('keydown',e=>{pKeys.add(e.key);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>pKeys.delete(e.key));
[['up','ArrowUp'],['down','ArrowDown'],['left','ArrowLeft'],['right','ArrowRight']].forEach(([id,key])=>{
  const b=document.getElementById(id);
  b.addEventListener('mousedown',()=>pKeys.add(key));b.addEventListener('mouseup',()=>pKeys.delete(key));b.addEventListener('mouseleave',()=>pKeys.delete(key));
  b.addEventListener('touchstart',e=>{e.preventDefault();pKeys.add(key);},{passive:false});
  b.addEventListener('touchend',e=>{e.preventDefault();pKeys.delete(key);},{passive:false});
});
</script>
</body>
</html>
