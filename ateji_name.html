<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanji Name Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Hina+Mincho&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4efe6;
      --paper: #fffaf0;
      --ink: #111;
      --accent: #8b1e1e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #fff8e8, var(--bg));
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      background: rgba(255, 250, 240, 0.9);
      border: 1px solid rgba(80, 50, 20, 0.18);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(60, 40, 20, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0 0 24px;
      color: #67543d;
      line-height: 1.8;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 28px;
    }

    input {
      font-size: 20px;
      padding: 16px 18px;
      border: 1px solid rgba(80, 50, 20, 0.22);
      border-radius: 14px;
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(139, 30, 30, 0.12);
    }

    button {
      font-size: 18px;
      font-weight: 700;
      padding: 0 22px;
      border: none;
      border-radius: 14px;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.05);
    }

    .result-wrap {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 22px;
      align-items: stretch;
    }

    .info, .paper {
      border-radius: 20px;
      padding: 24px;
    }

    .info {
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(80, 50, 20, 0.14);
    }

    .row {
      margin-bottom: 18px;
    }

    .label {
      font-size: 13px;
      color: #80684a;
      margin-bottom: 6px;
    }

    .value {
      font-size: 28px;
      font-weight: 800;
    }

    .paper {
      position: relative;
      min-height: 330px;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0,0,0,0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 42px 42px;
      border: 12px solid #e7dcc6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      pointer-events: none;
    }

    .kanji {
      writing-mode: vertical-rl;
      font-family: "Zen Kurenaido", "Hina Mincho", "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(72px, 18vw, 150px);
      line-height: 1.05;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-shadow:
        1px 1px 0 rgba(0,0,0,0.08),
        2px 4px 8px rgba(0,0,0,0.18);
      transform: rotate(-1deg);
    }

    .seal {
      position: absolute;
      right: 26px;
      bottom: 24px;
      width: 58px;
      height: 58px;
      border: 3px solid var(--accent);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-family: "Hina Mincho", serif;
      transform: rotate(5deg);
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #80684a;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      .form, .result-wrap {
        grid-template-columns: 1fr;
      }

      button {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Kanji Name Generator</h1>
    <p class="lead">外国人の名前をカタカナに変換し、意味を持たせた漢字の当て字として表示します。</p>

    <div class="form">
      <input id="nameInput" type="text" placeholder="例：michael / emily / john" autocomplete="off" />
      <button id="generateButton">変換する</button>
    </div>

    <section class="result-wrap">
      <div class="info">
        <div class="row">
          <div class="label">Input</div>
          <div class="value" id="inputName">michael</div>
        </div>
        <div class="row">
          <div class="label">Katakana</div>
          <div class="value" id="katakanaName">マイケル</div>
        </div>
        <div class="row">
          <div class="label">Kanji Ateji</div>
          <div class="value" id="kanjiNameSmall">舞蹴</div>
        </div>
        <p class="note" id="meaningText">舞＝優雅に舞う、蹴＝力強く進む。音の近さと見た目のインパクトを優先した当て字です。</p>
      </div>

      <div class="paper">
        <div class="kanji" id="kanjiNameLarge">舞蹴</div>
        <div class="seal">名</div>
      </div>
    </section>
  </main>

  <script>
    // ============================================================
    // その場生成型・外国人名 → カタカナ → 漢字当て字ジェネレーター
    // ============================================================
    // ポイント：
    // 1. 名前辞書に依存せず、英語名をローマ字風の音節に分解する
    // 2. 各音節に近い漢字候補をその場で選ぶ
    // 3. 良い意味の漢字を中心にして、毎回少し違う当て字を作る
    // ============================================================

    const kanjiBySound = {
      a: [
        { kanji: "愛", meaning: "愛情" },
        { kanji: "亜", meaning: "新しい可能性" },
        { kanji: "明", meaning: "明るさ" }
      ],
      i: [
        { kanji: "威", meaning: "存在感" },
        { kanji: "衣", meaning: "美しい装い" },
        { kanji: "維", meaning: "つながり" }
      ],
      u: [
        { kanji: "優", meaning: "やさしさ" },
        { kanji: "悠", meaning: "ゆったりした大きさ" },
        { kanji: "有", meaning: "才能を持つ" }
      ],
      e: [
        { kanji: "恵", meaning: "めぐみ" },
        { kanji: "英", meaning: "すぐれた才能" },
        { kanji: "栄", meaning: "繁栄" }
      ],
      o: [
        { kanji: "央", meaning: "中心に立つ" },
        { kanji: "王", meaning: "堂々とした存在" },
        { kanji: "桜", meaning: "美しさと品格" }
      ],

      ka: [{ kanji: "華", meaning: "華やかさ" }, { kanji: "香", meaning: "よい香り" }, { kanji: "翔", meaning: "大きく羽ばたく" }],
      ki: [{ kanji: "輝", meaning: "輝き" }, { kanji: "希", meaning: "希望" }, { kanji: "樹", meaning: "大きく育つ" }],
      ku: [{ kanji: "空", meaning: "広い空" }, { kanji: "久", meaning: "長く続く" }, { kanji: "玖", meaning: "美しい黒い宝石" }],
      ke: [{ kanji: "慶", meaning: "よろこび" }, { kanji: "慧", meaning: "知恵" }, { kanji: "景", meaning: "美しい景色" }],
      ko: [{ kanji: "光", meaning: "光" }, { kanji: "幸", meaning: "幸せ" }, { kanji: "虎", meaning: "勇ましさ" }],

      sa: [{ kanji: "沙", meaning: "美しい砂浜" }, { kanji: "咲", meaning: "花が咲く" }, { kanji: "彩", meaning: "色どり" }],
      si: [{ kanji: "志", meaning: "強い志" }, { kanji: "詩", meaning: "美しい言葉" }, { kanji: "紫", meaning: "高貴さ" }],
      shi: [{ kanji: "志", meaning: "強い志" }, { kanji: "詩", meaning: "美しい言葉" }, { kanji: "紫", meaning: "高貴さ" }],
      su: [{ kanji: "寿", meaning: "長寿と祝い" }, { kanji: "澄", meaning: "澄んだ心" }, { kanji: "翠", meaning: "美しい緑" }],
      se: [{ kanji: "聖", meaning: "清らかさ" }, { kanji: "星", meaning: "星の輝き" }, { kanji: "誠", meaning: "誠実" }],
      so: [{ kanji: "蒼", meaning: "青く広い空" }, { kanji: "想", meaning: "思いやり" }, { kanji: "颯", meaning: "さわやかさ" }],

      ta: [{ kanji: "太", meaning: "大きくたくましい" }, { kanji: "多", meaning: "豊かさ" }, { kanji: "拓", meaning: "道を切り開く" }],
      ti: [{ kanji: "知", meaning: "知性" }, { kanji: "千", meaning: "多くの可能性" }, { kanji: "智", meaning: "深い知恵" }],
      chi: [{ kanji: "知", meaning: "知性" }, { kanji: "千", meaning: "多くの可能性" }, { kanji: "智", meaning: "深い知恵" }],
      tu: [{ kanji: "月", meaning: "静かな美しさ" }, { kanji: "翼", meaning: "自由に羽ばたく" }, { kanji: "紬", meaning: "丁寧に紡ぐ" }],
      tsu: [{ kanji: "月", meaning: "静かな美しさ" }, { kanji: "翼", meaning: "自由に羽ばたく" }, { kanji: "紬", meaning: "丁寧に紡ぐ" }],
      te: [{ kanji: "天", meaning: "広い空" }, { kanji: "照", meaning: "照らす" }, { kanji: "哲", meaning: "賢さ" }],
      to: [{ kanji: "翔", meaning: "羽ばたく" }, { kanji: "斗", meaning: "星を量る器" }, { kanji: "都", meaning: "洗練" }],

      na: [{ kanji: "奈", meaning: "美しい響き" }, { kanji: "菜", meaning: "自然な生命力" }, { kanji: "凪", meaning: "穏やかさ" }],
      ni: [{ kanji: "仁", meaning: "思いやり" }, { kanji: "二", meaning: "調和" }, { kanji: "虹", meaning: "希望の架け橋" }],
      nu: [{ kanji: "温", meaning: "あたたかさ" }, { kanji: "縫", meaning: "結び合わせる" }, { kanji: "奴", meaning: "古風な響き" }],
      ne: [{ kanji: "音", meaning: "響き" }, { kanji: "寧", meaning: "穏やかさ" }, { kanji: "根", meaning: "根を張る強さ" }],
      no: [{ kanji: "乃", meaning: "やわらかな響き" }, { kanji: "野", meaning: "自然" }, { kanji: "望", meaning: "希望" }],

      ha: [{ kanji: "羽", meaning: "自由" }, { kanji: "葉", meaning: "生命力" }, { kanji: "覇", meaning: "力強さ" }],
      hi: [{ kanji: "陽", meaning: "太陽" }, { kanji: "妃", meaning: "上品さ" }, { kanji: "飛", meaning: "飛躍" }],
      fu: [{ kanji: "風", meaning: "自由な風" }, { kanji: "富", meaning: "豊かさ" }, { kanji: "歩", meaning: "前へ進む" }],
      he: [{ kanji: "平", meaning: "平和" }, { kanji: "兵", meaning: "勇敢さ" }, { kanji: "慧", meaning: "知恵" }],
      ho: [{ kanji: "穂", meaning: "実り" }, { kanji: "宝", meaning: "大切なもの" }, { kanji: "帆", meaning: "前へ進む力" }],

      ma: [{ kanji: "舞", meaning: "優雅に舞う" }, { kanji: "真", meaning: "まこと" }, { kanji: "磨", meaning: "磨き上げる" }],
      mi: [{ kanji: "美", meaning: "美しさ" }, { kanji: "実", meaning: "実り" }, { kanji: "魅", meaning: "魅力" }],
      mu: [{ kanji: "夢", meaning: "夢" }, { kanji: "武", meaning: "強さ" }, { kanji: "睦", meaning: "仲の良さ" }],
      me: [{ kanji: "芽", meaning: "新しい芽" }, { kanji: "恵", meaning: "めぐみ" }, { kanji: "明", meaning: "明るさ" }],
      mo: [{ kanji: "萌", meaning: "芽吹き" }, { kanji: "桃", meaning: "やわらかな魅力" }, { kanji: "望", meaning: "願い" }],

      ya: [{ kanji: "也", meaning: "自然体" }, { kanji: "弥", meaning: "広がり" }, { kanji: "矢", meaning: "まっすぐ進む" }],
      yu: [{ kanji: "優", meaning: "やさしさ" }, { kanji: "悠", meaning: "大きな余裕" }, { kanji: "結", meaning: "人との結びつき" }],
      yo: [{ kanji: "陽", meaning: "太陽" }, { kanji: "世", meaning: "世界" }, { kanji: "誉", meaning: "名誉" }],

      ra: [{ kanji: "羅", meaning: "広がる美しさ" }, { kanji: "良", meaning: "良さ" }, { kanji: "楽", meaning: "楽しさ" }],
      ri: [{ kanji: "莉", meaning: "可憐さ" }, { kanji: "理", meaning: "知性" }, { kanji: "璃", meaning: "宝石の美しさ" }],
      ru: [{ kanji: "琉", meaning: "美しい宝石" }, { kanji: "流", meaning: "流れる才能" }, { kanji: "瑠", meaning: "深い青の宝石" }],
      re: [{ kanji: "怜", meaning: "賢さ" }, { kanji: "礼", meaning: "礼儀" }, { kanji: "麗", meaning: "美しさ" }],
      ro: [{ kanji: "路", meaning: "進む道" }, { kanji: "朗", meaning: "明るさ" }, { kanji: "郎", meaning: "親しみ" }],

      wa: [{ kanji: "和", meaning: "調和" }, { kanji: "環", meaning: "つながり" }, { kanji: "羽", meaning: "自由" }],
      n: [{ kanji: "恩", meaning: "感謝" }, { kanji: "音", meaning: "響き" }, { kanji: "仁", meaning: "思いやり" }]
    };

    const kanaBySound = {
      a: "ア", i: "イ", u: "ウ", e: "エ", o: "オ",
      ka: "カ", ki: "キ", ku: "ク", ke: "ケ", ko: "コ",
      sa: "サ", si: "シ", shi: "シ", su: "ス", se: "セ", so: "ソ",
      ta: "タ", ti: "チ", chi: "チ", tu: "ツ", tsu: "ツ", te: "テ", to: "ト",
      na: "ナ", ni: "ニ", nu: "ヌ", ne: "ネ", no: "ノ",
      ha: "ハ", hi: "ヒ", fu: "フ", hu: "フ", he: "ヘ", ho: "ホ",
      ma: "マ", mi: "ミ", mu: "ム", me: "メ", mo: "モ",
      ya: "ヤ", yu: "ユ", yo: "ヨ",
      ra: "ラ", ri: "リ", ru: "ル", re: "レ", ro: "ロ",
      wa: "ワ", n: "ン",
      ga: "ガ", gi: "ギ", gu: "グ", ge: "ゲ", go: "ゴ",
      za: "ザ", ji: "ジ", zu: "ズ", ze: "ゼ", zo: "ゾ",
      da: "ダ", di: "ディ", du: "ドゥ", de: "デ", do: "ド",
      ba: "バ", bi: "ビ", bu: "ブ", be: "ベ", bo: "ボ",
      pa: "パ", pi: "ピ", pu: "プ", pe: "ペ", po: "ポ",
      ja: "ジャ", ju: "ジュ", jo: "ジョ",
      cha: "チャ", chu: "チュ", cho: "チョ",
      sha: "シャ", shu: "シュ", sho: "ショ",
      fa: "ファ", fi: "フィ", fe: "フェ", fo: "フォ",
      va: "ヴァ", vi: "ヴィ", vu: "ヴ", ve: "ヴェ", vo: "ヴォ"
    };

    const specialNameSounds = {
      michael: ["ma", "i", "ke", "ru"],
      mike: ["ma", "i", "ku"],
      john: ["jo", "n"],
      emily: ["e", "mi", "ri"],
      alice: ["a", "ri", "su"],
      david: ["de", "i", "bi", "do"],
      daniel: ["da", "ni", "e", "ru"],
      james: ["je", "i", "mu", "su"],
      william: ["wi", "ri", "a", "mu"],
      olivia: ["o", "ri", "vi", "a"],
      sophia: ["so", "fi", "a"],
      emma: ["e", "ma"],
      noah: ["no", "a"],
      lucas: ["ru", "ka", "su"],
      liam: ["ri", "a", "mu"],
      ethan: ["i", "sa", "n"],
      ava: ["e", "i", "va"],
      mia: ["mi", "a"],
      isabella: ["i", "za", "be", "ra"]
    };

    // 追加音。日本語の完全な発音ではなく、当て字生成用に近い音へ寄せる。
    const extraSoundMap = {
      je: { kana: "ジェ", base: "se" },
      wi: { kana: "ウィ", base: "ri" },
      we: { kana: "ウェ", base: "e" },
      wo: { kana: "ウォ", base: "o" },
      th: { kana: "ス", base: "su" },
      la: { kana: "ラ", base: "ra" },
      li: { kana: "リ", base: "ri" },
      lu: { kana: "ル", base: "ru" },
      le: { kana: "レ", base: "re" },
      lo: { kana: "ロ", base: "ro" },
      va: { kana: "ヴァ", base: "ha" },
      vi: { kana: "ヴィ", base: "bi" },
      vu: { kana: "ヴ", base: "fu" },
      ve: { kana: "ヴェ", base: "be" },
      vo: { kana: "ヴォ", base: "bo" }
    };

    // 濁音・半濁音など、漢字候補は近い清音から流用する。
    const soundFallback = {
      ga: "ka", gi: "ki", gu: "ku", ge: "ke", go: "ko",
      za: "sa", ji: "shi", zu: "su", ze: "se", zo: "so",
      da: "ta", di: "ti", du: "tu", de: "te", do: "to",
      ba: "ha", bi: "hi", bu: "fu", be: "he", bo: "ho",
      pa: "ha", pi: "hi", pu: "fu", pe: "he", po: "ho",
      ja: "shi", ju: "yu", jo: "yo",
      cha: "chi", chu: "yu", cho: "yo",
      sha: "shi", shu: "yu", sho: "yo",
      fa: "ha", fi: "hi", fe: "he", fo: "ho",
      wi: "ri", we: "e", wo: "o",
      va: "ha", vi: "hi", vu: "fu", ve: "he", vo: "ho",
      je: "se"
    };

    function normalizeName(name) {
      return name
        .toLowerCase()
        .trim()
        .replace(/[^a-z]/g, "");
    }

    function splitIntoSounds(name) {
      const normalized = normalizeName(name);
      if (!normalized) return ["ma", "i"];
      if (specialNameSounds[normalized]) return specialNameSounds[normalized];

      let text = normalized;

      // 英語名でありがちな語尾を日本語発音寄りに補正
      text = text
        .replace(/ph/g, "f")
        .replace(/ck/g, "k")
        .replace(/qu/g, "ku")
        .replace(/x/g, "ks")
        .replace(/c(?=e|i|y)/g, "s")
        .replace(/c/g, "k")
        .replace(/y$/g, "i")
        .replace(/e$/g, "");

      const keys = Object.keys({ ...kanaBySound, ...extraSoundMap }).sort((a, b) => b.length - a.length);
      const sounds = [];
      let i = 0;

      while (i < text.length) {
        let matched = null;

        for (const key of keys) {
          if (text.startsWith(key, i)) {
            matched = key;
            break;
          }
        }

        if (matched) {
          sounds.push(matched);
          i += matched.length;
        } else {
          // 子音だけ残った場合は、読みやすい母音を補う
          const ch = text[i];
          const consonantMap = {
            b: "bu", c: "ku", d: "do", f: "fu", g: "gu", h: "ha",
            j: "ji", k: "ku", l: "ru", m: "mu", p: "pu", q: "ku",
            r: "ru", s: "su", t: "to", v: "bu", w: "wa", z: "zu"
          };
          sounds.push(consonantMap[ch] || "a");
          i += 1;
        }
      }

      // 長すぎる名前は表示バランスを優先して最大5文字分程度にする
      return sounds.slice(0, 5);
    }

    function soundToKana(sound) {
      if (kanaBySound[sound]) return kanaBySound[sound];
      if (extraSoundMap[sound]) return extraSoundMap[sound].kana;
      const fallback = soundFallback[sound];
      if (fallback && kanaBySound[fallback]) return kanaBySound[fallback];
      return "ア";
    }

    function soundToKanjiCandidate(sound) {
      const normalizedSound = extraSoundMap[sound]?.base || soundFallback[sound] || sound;
      const candidates = kanjiBySound[normalizedSound] || kanjiBySound[normalizedSound[0]] || kanjiBySound.a;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function generateAteji(name) {
      const sounds = splitIntoSounds(name);
      const kana = sounds.map(soundToKana).join("");
      const picked = sounds.map(soundToKanjiCandidate);
      const kanji = picked.map(item => item.kanji).join("");
      const meaning = picked.map(item => `${item.kanji}＝${item.meaning}`).join("、") + "。音の近さと良い意味を優先して、その場で漢字を組み合わせています。";

      return { kana, kanji, meaning };
    }

    function generate() {
      const rawName = document.getElementById("nameInput").value.trim() || "michael";
      const result = generateAteji(rawName);

      document.getElementById("inputName").textContent = rawName;
      document.getElementById("katakanaName").textContent = result.kana;
      document.getElementById("kanjiNameSmall").textContent = result.kanji;
      document.getElementById("kanjiNameLarge").textContent = result.kanji;
      document.getElementById("meaningText").textContent = result.meaning;
    }

    document.getElementById("generateButton").addEventListener("click", generate);
    document.getElementById("nameInput").addEventListener("keydown", event => {
      if (event.key === "Enter") generate();
    });

    generate();
  </script>
</body>
</html>
