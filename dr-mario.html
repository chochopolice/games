<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. PILL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  color: #fff;
}
h1 {
  font-size: 18px;
  margin-bottom: 10px;
  letter-spacing: 3px;
}
h1 span { color: #ff3c5f; }
#ui {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.info-box {
  background: #111830;
  border: 2px solid #223;
  border-radius: 6px;
  padding: 10px 14px;
  text-align: center;
  min-width: 90px;
  margin-bottom: 10px;
}
.info-label { font-size: 6px; color: #556; margin-bottom: 6px; }
.info-val { font-size: 20px; }
#canvas-wrap {
  position: relative;
  border: 3px solid #223;
  border-radius: 8px;
  overflow: hidden;
  background: #080c1a;
}
canvas { display: block; }
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(5,8,20,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 20px;
}
#overlay h2 { font-size: 13px; line-height: 1.8; }
#overlay p { font-size: 7px; color: #4a6fa5; line-height: 2.2; }
button {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  background: #182050;
  border: 2px solid #3ca8ff;
  color: #fff;
  padding: 10px 22px;
  border-radius: 4px;
  cursor: pointer;
}
button:hover { background: #243080; }
#hint {
  font-size: 6px;
  color: #334;
  margin-top: 10px;
  text-align: center;
  line-height: 2.4;
}
</style>
</head>
<body>
<h1>Dr. <span>PILL</span></h1>
<div id="ui">
  <!-- left -->
  <div>
    <div class="info-box">
      <div class="info-label">SCORE</div>
      <div class="info-val" id="elScore">0</div>
    </div>
    <div class="info-box">
      <div class="info-label">LEVEL</div>
      <div class="info-val" id="elLevel">1</div>
    </div>
  </div>
  <!-- board -->
  <div id="canvas-wrap">
    <canvas id="gc" width="192" height="336"></canvas>
    <div id="overlay">
      <h2>Dr. PILL</h2>
      <p>4つ同じ色を並べて<br>ウイルスを全滅させよう！</p>
      <button id="btnStart">START</button>
    </div>
  </div>
  <!-- right -->
  <div>
    <div class="info-box">
      <div class="info-label">VIRUS</div>
      <div class="info-val" id="elVirus" style="color:#ff3c5f">0</div>
    </div>
    <div class="info-box">
      <div class="info-label">NEXT</div>
      <canvas id="nc" width="56" height="28" style="margin:4px auto;display:block"></canvas>
    </div>
  </div>
</div>
<div id="hint">← → 移動　↑/Z 回転　↓ 落下　P 停止</div>

<script>
// ===== Constants =====
const COLS = 8, ROWS = 14, CS = 24;
const COLORS = ['R','B','Y'];
const CFILL = { R:'#ff3c5f', B:'#3ca8ff', Y:'#ffd93d' };
const SPEED  = [900,720,580,460,370,300,240,190,150,120,95];

// ===== Canvas =====
const gc  = document.getElementById('gc');
const ctx = gc.getContext('2d');
const nc  = document.getElementById('nc');
const nctx= nc.getContext('2d');

// ===== State =====
let board;      // [ROWS][COLS] null | {color:'R'|'B'|'Y', kind:'pill'|'virus', half:'L'|'R'|'U'|'D'|'O'}
let pill;       // {segs:[{r,c,color,half}], rot:0|1}
let nextColors; // [colorA, colorB]
let score, level, virusLeft;
let phase;      // 'idle' | 'play' | 'pause' | 'flash' | 'grav' | 'over' | 'win'
let dropAcc, lastTs;
let flashData, flashAcc, flashTick;
let raf;

// ===== Init =====
function init(lvl) {
  level = lvl;
  score = 0;
  board = [];
  for (let r=0;r<ROWS;r++) { board[r]=[]; for(let c=0;c<COLS;c++) board[r][c]=null; }
  virusLeft = 0;
  placeViruses();
  nextColors = rndColors();
  phase = 'play';
  dropAcc = 0;
  flashData = null;
  document.getElementById('overlay').style.display='none';
  updateUI();
  spawnPill();
  drawNext();
  cancelAnimationFrame(raf);
  lastTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function rndColors() {
  return [COLORS[Math.random()*3|0], COLORS[Math.random()*3|0]];
}

function placeViruses() {
  const n = Math.min(4 + level*2, 20);
  let placed=0, tries=0;
  while (placed<n && tries<2000) {
    tries++;
    const r = (ROWS/2|0) + (Math.random()*(ROWS/2)|0);
    const c = Math.random()*COLS|0;
    if (!board[r][c]) {
      board[r][c] = { color: COLORS[Math.random()*3|0], kind:'virus', half:'O' };
      placed++; virusLeft++;
    }
  }
}

// ===== Pill =====
function spawnPill() {
  const [ca,cb] = nextColors;
  nextColors = rndColors();
  drawNext();
  const col = (COLS/2|0) - 1;
  pill = {
    segs: [
      {r:0, c:col,   color:ca, half:'L'},
      {r:0, c:col+1, color:cb, half:'R'}
    ],
    rot: 0
  };
  if (!canPlace(pill.segs)) {
    pill = null;
    phase = 'over';
    showOv('GAME OVER', `スコア: ${score}`, 'RETRY', ()=>init(level));
  }
}

// ===== Collision =====
function inB(r,c){ return r>=0&&r<ROWS&&c>=0&&c<COLS; }
function isFree(r,c){ return inB(r,c) && !board[r][c]; }
function canPlace(segs){ return segs.every(s=>isFree(s.r,s.c)); }

// ===== Movement =====
function shift(dr,dc) {
  const ns = pill.segs.map(s=>({...s,r:s.r+dr,c:s.c+dc}));
  if (canPlace(ns)) { pill.segs=ns; return true; }
  return false;
}

function rotate() {
  if (!pill) return;
  const [a,b] = pill.segs;
  let ns;
  if (pill.rot===0) {
    // horiz→vert
    ns = [ {...a,half:'U'}, {r:a.r+1,c:a.c,color:b.color,half:'D'} ];
    if (!canPlace(ns)) { ns=ns.map(s=>({...s,c:s.c-1})); if(!canPlace(ns)) return; }
    pill.rot=1;
  } else {
    // vert→horiz
    ns = [ {...a,half:'L'}, {r:a.r,c:a.c+1,color:b.color,half:'R'} ];
    if (!canPlace(ns)) { ns=ns.map(s=>({...s,c:s.c-1})); if(!canPlace(ns)) return; }
    pill.rot=0;
  }
  pill.segs=ns;
}

// ===== Lock =====
function lock() {
  pill.segs.forEach(s=>{ board[s.r][s.c]={color:s.color,kind:'pill',half:s.half}; });
  pill=null;
  startClear();
}

// ===== Match & Clear =====
function startClear() {
  const m = getMatches();
  let cnt=0, vcnt=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(m[r][c]){ cnt++; if(board[r][c]?.kind==='virus') vcnt++; }
  }
  if (!cnt) {
    if (virusLeft <= 0) { phase='win'; showOv('STAGE CLEAR!',`スコア: ${score}`,'NEXT LEVEL',()=>init(level+1)); return; }
    spawnPill(); return;
  }
  score += ([0,100,200,400,800,1600,3200][Math.min(cnt,6)]) + vcnt*300;
  virusLeft -= vcnt;
  updateUI();
  // start flash phase
  flashData = m;
  flashAcc = 0;
  flashTick = 0;
  phase = 'flash';
}

function getMatches() {
  const m=[];
  for(let r=0;r<ROWS;r++){m[r]=[];for(let c=0;c<COLS;c++)m[r][c]=false;}
  // horiz
  for(let r=0;r<ROWS;r++){
    let run=1;
    for(let c=1;c<COLS;c++){
      if(board[r][c]&&board[r][c-1]&&board[r][c].color===board[r][c-1].color) run++;
      else { if(run>=4) for(let k=c-run;k<c;k++) m[r][k]=true; run=1; }
    }
    if(run>=4) for(let k=COLS-run;k<COLS;k++) m[r][k]=true;
  }
  // vert
  for(let c=0;c<COLS;c++){
    let run=1;
    for(let r=1;r<ROWS;r++){
      if(board[r][c]&&board[r-1][c]&&board[r][c].color===board[r-1][c].color) run++;
      else { if(run>=4) for(let k=r-run;k<r;k++) m[k][c]=true; run=1; }
    }
    if(run>=4) for(let k=ROWS-run;k<ROWS;k++) m[k][c]=true;
  }
  return m;
}

function removeCells() {
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) { if(flashData[r][c]) board[r][c]=null; }
  fixOrphans();
  flashData=null;
  applyGravity();
}

function fixOrphans(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=board[r][c];
    if(!cell||cell.kind!=='pill') continue;
    let o=false;
    if(cell.half==='L'&&!(c+1<COLS&&board[r][c+1]?.half==='R')) o=true;
    if(cell.half==='R'&&!(c-1>=0&&board[r][c-1]?.half==='L')) o=true;
    if(cell.half==='U'&&!(r+1<ROWS&&board[r+1]?.[c]?.half==='D')) o=true;
    if(cell.half==='D'&&!(r-1>=0&&board[r-1]?.[c]?.half==='U')) o=true;
    if(o) board[r][c]={...cell,half:'O'};
  }
}

function applyGravity(){
  let moved=false;
  for(let r=ROWS-2;r>=0;r--){
    for(let c=0;c<COLS;c++){
      const cell=board[r][c];
      if(!cell||cell.kind==='virus') continue;
      if(cell.half==='O'&&!board[r+1][c]){
        board[r+1][c]=cell; board[r][c]=null; moved=true;
      } else if(cell.half==='L'){
        const right=board[r][c+1];
        if(right?.half==='R'&&r+1<ROWS&&!board[r+1][c]&&!board[r+1][c+1]){
          board[r+1][c]=cell; board[r+1][c+1]=right;
          board[r][c]=null; board[r][c+1]=null; moved=true;
        }
      } else if(cell.half==='U'){
        const dn=board[r+1]?.[c];
        if(dn?.half==='D'&&r+2<ROWS&&!board[r+2][c]){
          board[r+2][c]=dn; board[r+1][c]=cell; board[r][c]=null; moved=true;
        }
      }
    }
  }
  // 落ちるものがある限り再帰的に繰り返す
  if(moved){ phase='grav'; setTimeout(()=>applyGravity(), 80); }
  else { phase='play'; startClear(); }
}

// ===== Draw =====
function drawHalf(cx,px,py,color,half){
  const R=CS/2-2;
  cx.fillStyle=CFILL[color];
  cx.beginPath();
  if(half==='L'){
    cx.arc(px+R+2,py+CS/2,R,Math.PI/2,Math.PI*3/2);
    cx.lineTo(px+CS,py+CS/2-R);
    cx.lineTo(px+CS,py+CS/2+R);
  } else if(half==='R'){
    cx.arc(px+CS-R-2,py+CS/2,R,-Math.PI/2,Math.PI/2);
    cx.lineTo(px,py+CS/2+R);
    cx.lineTo(px,py+CS/2-R);
  } else if(half==='U'){
    cx.arc(px+CS/2,py+R+2,R,Math.PI,0);
    cx.lineTo(px+CS/2+R,py+CS);
    cx.lineTo(px+CS/2-R,py+CS);
  } else if(half==='D'){
    cx.arc(px+CS/2,py+CS-R-2,R,0,Math.PI);
    cx.lineTo(px+CS/2-R,py);
    cx.lineTo(px+CS/2+R,py);
  } else {
    cx.arc(px+CS/2,py+CS/2,R,0,Math.PI*2);
  }
  cx.closePath();
  cx.fill();
  cx.fillStyle='rgba(255,255,255,0.2)';
  cx.beginPath();
  cx.ellipse(px+CS/2-2,py+CS/2-3,R*0.45,R*0.28,-0.4,0,Math.PI*2);
  cx.fill();
}

function drawVirus(cx,px,py,color){
  const r=CS/2-3;
  cx.fillStyle=CFILL[color];
  cx.beginPath(); cx.arc(px+CS/2,py+CS/2,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle=CFILL[color]; cx.lineWidth=2;
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    cx.beginPath();
    cx.moveTo(px+CS/2+Math.cos(a)*r,py+CS/2+Math.sin(a)*r);
    cx.lineTo(px+CS/2+Math.cos(a)*(r+3),py+CS/2+Math.sin(a)*(r+3));
    cx.stroke();
  }
  cx.fillStyle='#fff';
  cx.beginPath(); cx.arc(px+CS/2-3,py+CS/2-2,2.5,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(px+CS/2+3,py+CS/2-2,2.5,0,Math.PI*2); cx.fill();
  cx.fillStyle='#000';
  cx.beginPath(); cx.arc(px+CS/2-3,py+CS/2-2,1,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(px+CS/2+3,py+CS/2-2,1,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#fff'; cx.lineWidth=1.5;
  cx.beginPath(); cx.arc(px+CS/2,py+CS/2+2,3,0.2,Math.PI-0.2); cx.stroke();
}

function render(showFlash){
  ctx.clearRect(0,0,gc.width,gc.height);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CS);ctx.lineTo(COLS*CS,r*CS);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CS,0);ctx.lineTo(c*CS,ROWS*CS);ctx.stroke();}

  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=board[r][c];
    if(!cell) continue;
    if(flashData?.[r]?.[c] && !showFlash) continue;
    const px=c*CS, py=r*CS;
    if(cell.kind==='virus') drawVirus(ctx,px,py,cell.color);
    else drawHalf(ctx,px,py,cell.color,cell.half);
  }

  // ghost + pill
  if(pill && phase==='play'){
    let gs=pill.segs.map(s=>({...s}));
    while(true){ const ns=gs.map(s=>({...s,r:s.r+1})); if(ns.every(s=>isFree(s.r,s.c)))gs=ns; else break; }
    ctx.globalAlpha=0.18;
    gs.forEach(s=>drawHalf(ctx,s.c*CS,s.r*CS,s.color,s.half));
    ctx.globalAlpha=1;
    pill.segs.forEach(s=>drawHalf(ctx,s.c*CS,s.r*CS,s.color,s.half));
  }
}

function drawNext(){
  nctx.clearRect(0,0,nc.width,nc.height);
  if(!nextColors) return;
  drawHalf(nctx,2,2,nextColors[0],'L');
  drawHalf(nctx,2+CS,2,nextColors[1],'R');
}

// ===== Game loop =====
function tick(ts){
  raf=requestAnimationFrame(tick);
  const dt=ts-lastTs; lastTs=ts;

  if(phase==='flash'){
    flashAcc+=dt;
    if(flashAcc>=80){ flashAcc=0; flashTick++; }
    if(flashTick>=8){ removeCells(); }
    else render(flashTick%2===0);
    return;
  }

  if(phase!=='play'){ render(true); return; }

  dropAcc+=dt;
  const spd=SPEED[Math.min(level-1,SPEED.length-1)];
  if(dropAcc>=spd){
    dropAcc=0;
    if(pill){ if(!shift(1,0)) lock(); }
  }
  render(true);


}

// ===== UI =====
function updateUI(){
  document.getElementById('elScore').textContent=score.toLocaleString();
  document.getElementById('elLevel').textContent=level;
  document.getElementById('elVirus').textContent=virusLeft;
}

function showOv(title,sub,btn,fn){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>${title}</h2><p>${sub}</p><button id="ovBtn">${btn}</button>`;
  ov.style.display='flex';
  document.getElementById('ovBtn').onclick=fn;
}

// ===== Input =====
const held={};
document.addEventListener('keydown', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if(held[e.key]) return;
  held[e.key]=true;

  if(e.key==='p'||e.key==='P'){
    if(phase==='play'){
      phase='pause';
      showOv('PAUSE','','RESUME',()=>{ document.getElementById('overlay').style.display='none'; phase='play'; lastTs=performance.now(); });
    }
    return;
  }
  if(phase!=='play'||!pill) return;
  if(e.key==='ArrowLeft')  shift(0,-1);
  if(e.key==='ArrowRight') shift(0,1);
  if(e.key==='ArrowUp'||e.key==='z'||e.key==='Z') rotate();
  if(e.key==='ArrowDown'){ if(!shift(1,0)) lock(); dropAcc=0; }
});
document.addEventListener('keyup', e=>{ held[e.key]=false; });

// DAS
let dasAcc=0;
setInterval(()=>{
  if(phase!=='play'||!pill) return;
  if(held['ArrowLeft'])  { dasAcc+=16; if(dasAcc>180) shift(0,-1); }
  else if(held['ArrowRight']){ dasAcc+=16; if(dasAcc>180) shift(0,1); }
  else dasAcc=0;
},16);

// Touch
let tx0=0,ty0=0;
gc.addEventListener('touchstart',e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; },{passive:true});
gc.addEventListener('touchend',e=>{
  if(phase!=='play'||!pill) return;
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(ax<12&&ay<12) rotate();
  else if(ax>ay){ dx<0?shift(0,-1):shift(0,1); }
  else{ if(dy>0){if(!shift(1,0))lock();} else rotate(); }
},{passive:true});

// ===== Boot =====
document.getElementById('btnStart').onclick=()=>init(1);
// initial blank render
ctx.clearRect(0,0,gc.width,gc.height);
</script>
</body>
</html>
